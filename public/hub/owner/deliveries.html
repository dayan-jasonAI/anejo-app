<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Añejo HUB · Deliveries</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#1b3a2b">
<link rel="manifest" href="/hub/manifest.webmanifest">
<link rel="icon" type="image/png" href="/assets/img/favicon.png">
<link rel="stylesheet" href="/hub/assets/hub.css">
</head>
<body>
<div class="hub-bar">
  <h1>AÑEJO · DELIVERIES</h1>
  <div class="hub-bar-actions"><button id="lang-toggle" type="button">ES</button></div>
</div>

<div class="hub-wrap">
  <div id="owner-root" class="hub-loading"><p data-i18n>Loading deliveries…</p></div>
</div>

<nav id="owner-nav" class="hub-nav"></nav>

<script src="/assets/js/i18n.js"></script>
<script src="/hub/assets/hub.js"></script>
<script src="/hub/owner/assets/owner.js"></script>
<script>
(function () {
  Hub.boot();
  var lt = document.getElementById('lang-toggle');
  if (lt && window.AnejoLang) {
    lt.textContent = window.AnejoLang.get() === 'es' ? 'EN' : 'ES';
    lt.addEventListener('click', function () { var n = window.AnejoLang.get() === 'es' ? 'en' : 'es'; window.AnejoLang.set(n); lt.textContent = n === 'es' ? 'EN' : 'ES'; });
  }

  function localToday() {
    try { return new Date().toLocaleDateString('en-CA'); } catch (e) { return new Date().toISOString().slice(0, 10); }
  }
  function money(c) { return '$' + ((Number(c) || 0) / 100).toFixed(2); }
  function clockET(ms) { try { return new Date(Number(ms)).toLocaleTimeString('en-US', { timeZone: 'America/New_York', hour: 'numeric', minute: '2-digit' }); } catch (e) { return ''; } }
  // The line every route shows: pay · stops · miles · finish ETA.
  function routeMeta(ro) {
    var parts = [];
    if (ro.pay_cents != null) parts.push('<b style="color:var(--green)">' + money(ro.pay_cents) + '</b> pay');
    parts.push((ro.stops != null ? ro.stops : ro.stop_count || 0) + ' stops');
    if (ro.total_miles_est != null) parts.push(ro.total_miles_est + ' mi');
    if (ro.eta_complete_at) parts.push('done ~' + clockET(ro.eta_complete_at));
    else if (ro.total_minutes != null) parts.push('~' + ro.total_minutes + ' min');
    return parts.join(' · ');
  }

  // ---- Smart route planner: group + optimize the day's orders, preview pay/miles/ETA ----
  var planData = null;
  function planRoutes() {
    var date = (document.getElementById('rdate') || {}).value || localToday();
    var el = document.getElementById('rplan'); if (!el) return;
    var btn = document.getElementById('rplanbtn'); if (btn) { btn.disabled = true; btn.textContent = 'Planning…'; }
    Hub.api('/api/hub/owner/route-plan', { method: 'POST', body: { date: date } }).then(function (d) {
      if (btn) { btn.disabled = false; btn.textContent = '⚡ Suggest efficient route(s)'; }
      planData = d;
      if (!d || !d.ok) { el.innerHTML = '<p class="row-sub">Could not plan.</p>'; return; }
      if (!d.groups || !d.groups.length) { el.innerHTML = '<p class="row-sub">No unassigned orders to plan for this date.</p>'; return; }
      var dopts = (d.drivers || []).map(function (s) { return '<option value="' + Owner.esc(s.id) + '">' + Owner.esc(s.name || s.id) + (s.available ? ' 🟢' : '') + '</option>'; }).join('');
      var tot = d.totals || {};
      el.innerHTML =
        '<div class="row-sub" style="margin:4px 0 8px">Suggested ' + d.groups.length + ' route' + (d.groups.length > 1 ? 's' : '') + ' for ' + (tot.stops || 0) + ' stops · ~' + (tot.miles || 0) + ' mi · <b>' + money(tot.pay_cents || 0) + '</b> total driver pay</div>' +
        d.groups.map(function (g, i) {
          var stops = g.stops.map(function (s) { return '<div class="row-sub" style="padding-left:6px">' + s.seq + '. ' + Owner.esc(s.name) + ' · ' + Owner.esc(s.window) + (s.geocoded ? '' : ' <span class="badge warn">not mapped</span>') + '</div>'; }).join('');
          return '<div class="card" style="border-left:4px solid var(--gold)">' +
            '<div class="row-title">Route ' + (i + 1) + (g.optimized ? ' ⚡' : '') + '</div>' +
            '<div class="row-sub" style="margin:2px 0 6px"><b style="color:var(--green)">' + money(g.pay_cents) + '</b> pay · ' + g.stop_count + ' stops' + (g.miles != null ? ' · ' + g.miles + ' mi' : '') + (g.eta_complete_at ? ' · done ~' + clockET(g.eta_complete_at) : '') + '</div>' +
            (g.rationale && g.rationale.text ? '<div class="row-sub" style="background:#f3efe2;border-radius:8px;padding:6px 9px;margin-bottom:6px;color:#6b5320">🤖 <b>AI Ops:</b> ' + Owner.esc(g.rationale.text) + '</div>' : '') +
            stops +
            '<div class="field" style="margin-top:8px"><select id="pd_' + i + '">' + dopts + '</select></div>' +
            '<button class="btn gold block" type="button" onclick="__assignPlan(' + i + ')">Assign this route</button>' +
          '</div>';
        }).join('');
    });
  }
  window.__assignPlan = function (i) {
    if (!planData || !planData.groups || !planData.groups[i]) return;
    var g = planData.groups[i];
    var date = (document.getElementById('rdate') || {}).value || localToday();
    var driver = (document.getElementById('pd_' + i) || {}).value;
    if (!driver) { Hub.toast('Pick a driver for this route.'); return; }
    Hub.api('/api/hub/owner/routes', { method: 'POST', body: { driver_id: driver, route_date: date, order_ids: g.order_ids, ai_optimized: true } }).then(function (r) {
      if (r && r.ok) { Hub.toast('Route assigned — ' + money(r.pay_cents) + ' · ' + (r.stop_count || 0) + ' stops'); planRoutes(); loadAssign(); loadToday(); }
      else Hub.toast((r && r.error) || 'Could not assign route');
    });
  };

  // ---- Owner pay settings (rates take effect on the next route assigned) ----
  function paySettingsHtml() {
    return '<details class="aud" style="margin-top:10px;border:1px solid var(--line);border-radius:10px;padding:0 12px">' +
      '<summary style="cursor:pointer;font-weight:700;color:var(--green);padding:9px 0">💵 Driver pay settings</summary>' +
      '<div style="padding-bottom:10px"><div class="row-sub" style="margin-bottom:8px">Pay = base + (per-stop × stops) + (per-mile × miles), with a route minimum. Set per-stop &amp; per-mile to 0 for a flat per-route rate.</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">' +
        payField('ps_base', 'Base $ / route') + payField('ps_stop', '$ / stop') + payField('ps_mile', '$ / mile') + payField('ps_min', 'Route minimum $') +
      '</div><button class="btn block" type="button" style="margin-top:10px" onclick="__savePay()">Save pay settings</button></div></details>';
  }
  function payField(id, label) {
    return '<div><label style="font-size:11px;color:var(--green);font-weight:700;display:block;margin-bottom:3px">' + label + '</label>' +
      '<input id="' + id + '" type="number" step="0.01" min="0" style="width:100%;padding:9px;border:1px solid var(--line);border-radius:8px"></div>';
  }
  function loadPayCfg() {
    Owner.get('/api/hub/owner/pay-config').then(function (d) {
      if (!d || !d.ok) return; var c = d.config || {};
      var set = function (id, cents) { var el = document.getElementById(id); if (el) el.value = ((Number(cents) || 0) / 100).toFixed(2); };
      set('ps_base', c.base_cents); set('ps_stop', c.per_stop_cents); set('ps_mile', c.per_mile_cents); set('ps_min', c.min_cents);
    });
  }
  window.__savePay = function () {
    var dollars = function (id) { return Math.round((parseFloat((document.getElementById(id) || {}).value) || 0) * 100); };
    Hub.api('/api/hub/owner/pay-config', { method: 'POST', body: { base_cents: dollars('ps_base'), per_stop_cents: dollars('ps_stop'), per_mile_cents: dollars('ps_mile'), min_cents: dollars('ps_min') } })
      .then(function (r) { Hub.toast(r && r.ok ? 'Pay settings saved' : 'Could not save'); });
  };

  // ---- Automated dispatch: hands-off route building at a set time each day ----
  function autoDispatchHtml() {
    var fld = function (id, label, input) { return '<div><label style="font-size:11px;color:var(--green);font-weight:700;display:block;margin-bottom:3px">' + label + '</label>' + input + '</div>'; };
    return '<div class="card" style="border-left:4px solid var(--green);margin-top:12px">' +
      '<div class="row-title">🤖 Automated dispatch</div>' +
      '<div class="row-sub" style="margin:4px 0 10px">When on, the HUB auto-builds the most efficient routes from the day’s orders and offers them to drivers at the set time — you don’t lift a finger.</div>' +
      '<label style="display:flex;align-items:center;gap:9px;margin-bottom:10px;font-weight:700;color:var(--green)"><input type="checkbox" id="ad_enabled" style="width:18px;height:18px"> Enable automated dispatch</label>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">' +
        fld('ad_time', 'Build time (ET)', '<input id="ad_time" type="time" value="09:05" style="width:100%;padding:9px;border:1px solid var(--line);border-radius:8px">') +
        fld('ad_max', 'Max stops / route', '<input id="ad_max" type="number" min="1" max="50" value="14" style="width:100%;padding:9px;border:1px solid var(--line);border-radius:8px">') +
      '</div>' +
      '<div style="margin-top:8px;font-size:13px"><span style="font-size:11px;color:var(--green);font-weight:700;text-transform:uppercase">Windows</span><br>' +
        '<label style="margin-right:16px"><input type="checkbox" id="ad_w_lunch" checked> Lunch</label>' +
        '<label><input type="checkbox" id="ad_w_dinner" checked> Dinner</label></div>' +
      '<button class="btn block" type="button" style="margin-top:12px" onclick="__saveAuto()">Save auto-dispatch settings</button>' +
      '<button class="btn gold block" type="button" style="margin-top:8px" onclick="__autoBuildNow()">⚡ Auto-build today’s routes now</button>' +
    '</div>';
  }
  function loadAutoCfg() {
    Owner.get('/api/hub/owner/dispatch-config').then(function (d) {
      if (!d || !d.ok) return; var c = d.config || {};
      var set = function (id, v) { var el = document.getElementById(id); if (el) el.value = v; };
      var chk = function (id, v) { var el = document.getElementById(id); if (el) el.checked = !!v; };
      chk('ad_enabled', c.enabled); set('ad_time', c.time_et || '09:05'); set('ad_max', c.max_per_route || 14);
      var w = c.windows || ['lunch', 'dinner']; chk('ad_w_lunch', w.indexOf('lunch') >= 0); chk('ad_w_dinner', w.indexOf('dinner') >= 0);
    });
  }
  window.__saveAuto = function () {
    var windows = []; if ((document.getElementById('ad_w_lunch') || {}).checked) windows.push('lunch'); if ((document.getElementById('ad_w_dinner') || {}).checked) windows.push('dinner');
    var body = { enabled: !!(document.getElementById('ad_enabled') || {}).checked, time_et: (document.getElementById('ad_time') || {}).value || '09:05', max_per_route: parseInt((document.getElementById('ad_max') || {}).value, 10) || 14, windows: windows };
    Hub.api('/api/hub/owner/dispatch-config', { method: 'POST', body: body }).then(function (r) { Hub.toast(r && r.ok ? (body.enabled ? 'Auto-dispatch ON · ' + body.time_et + ' ET' : 'Auto-dispatch saved (off)') : 'Could not save'); });
  };
  window.__autoBuildNow = function () {
    var date = (document.getElementById('rdate') || {}).value || localToday();
    if (!window.confirm('Auto-build and offer the most efficient routes for ' + date + ' now?')) return;
    Hub.api('/api/hub/admin/dispatch-tick', { method: 'POST', body: { force: true, date: date } }).then(function (r) {
      if (r && r.ok) { Hub.toast(r.created ? 'Built ' + r.created + ' route(s) for ' + (r.stops || 0) + ' stops' : 'No unassigned orders to build'); loadAssign(); loadToday(); }
      else Hub.toast((r && r.error) || 'Could not auto-build');
    });
  };

  function loadAssign() {
    var date = (document.getElementById('rdate') || {}).value || localToday();
    Owner.get('/api/hub/owner/routes?date=' + encodeURIComponent(date)).then(function (d) {
      var dsel = document.getElementById('rdriver');
      var ords = document.getElementById('rorders');
      var rlist = document.getElementById('rexisting');
      if (!dsel || !ords || !rlist) return;
      if (!d || !d.ok) { ords.innerHTML = '<p class="row-sub" data-i18n>No data.</p>'; return; }

      var availN = (d.drivers || []).filter(function (s) { return s.available; }).length;
      dsel.innerHTML = '<option value="" data-i18n>Select a driver</option>' + (d.drivers || []).map(function (s) {
        return '<option value="' + Owner.esc(s.id) + '">' + Owner.esc(s.name || s.id) + (s.available ? ' 🟢 available' : '') + '</option>';
      }).join('');
      if (!(d.drivers || []).length) {
        dsel.innerHTML = '<option value="" data-i18n>No drivers yet. Add drivers in Staff.</option>';
      }

      var unassigned = d.unassigned || [];
      // On-demand (ASAP) orders the kitchen has marked READY need a driver dispatched NOW.
      var dispatchN = unassigned.filter(function (o) { return o.needs_dispatch; }).length;
      var dispatchBanner = dispatchN
        ? '<div class="card accent" style="border-left:4px solid var(--gold);background:#fff8e9;margin-bottom:10px">' +
            '<div class="row-title">🛵 ' + dispatchN + ' on-demand order' + (dispatchN > 1 ? 's' : '') + ' ready for dispatch</div>' +
            '<div class="row-sub">' + (availN ? availN + ' driver' + (availN > 1 ? 's' : '') + ' available' : 'No driver is marked available') +
            ' — assign now for same-day delivery.</div></div>'
        : '';

      ords.innerHTML = dispatchBanner + (unassigned.length ? unassigned.map(function (o) {
        var items = '';
        try {
          var arr = JSON.parse(o.items || '[]');
          items = arr.map(function (it) { return (it.qty || 1) + '× ' + (it.name || ''); }).join(', ');
        } catch (e) { items = ''; }
        var addr = o.address
          ? '<div class="row-sub">📍 ' + Owner.esc(o.address) + (o.geocoded ? '' : ' <span class="badge warn" data-i18n>not mapped</span>') + '</div>'
          : '<div class="row-sub"><span class="badge crit" data-i18n>no address</span></div>';
        var od = o.needs_dispatch ? '<span class="badge crit">🛵 ASAP · DISPATCH</span> '
          : (o.on_demand ? '<span class="badge warn">🛵 ASAP</span> ' : '');
        return '<label class="row" style="cursor:pointer' + (o.needs_dispatch ? ';background:#fff8e9' : '') + '"><input type="checkbox" class="rorder" value="' + Owner.esc(o.id) + '" style="margin-right:10px">' +
          '<div class="row-main"><div class="row-title">' + Owner.esc(o.customer_name || o.id) + '</div>' +
          '<div class="row-sub">' + Owner.esc(items || '—') + ' · ' + Owner.esc(o.delivery_window || '') + '</div>' + addr + '</div>' +
          od + Owner.badge(o.status, Owner.kindFor(o.status)) + '</label>';
      }).join('') : '<p class="row-sub" data-i18n>No unassigned orders for this date.</p>');

      ords.querySelectorAll('.rorder').forEach(function (cb) { cb.addEventListener('change', updateAssignBtn); });
      updateAssignBtn();

      rlist.innerHTML = (d.routes || []).length ? d.routes.map(function (ro) {
        var offer = ro.offer_status === 'pending' ? ' <span class="badge warn" data-i18n>awaiting driver</span>'
          : ro.offer_status === 'unfilled' ? ' <span class="badge crit" data-i18n>unfilled — reassign</span>'
          : ro.offer_status === 'declined' ? ' <span class="badge warn" data-i18n>declined</span>' : '';
        return '<div class="row"><div class="row-main"><div class="row-title">' + Owner.esc(ro.driver_name || 'Unassigned') +
          (ro.ai_optimized ? ' ⚡' : '') + offer + '</div><div class="row-sub">' + routeMeta(ro) + '</div></div>' +
          Owner.badge(ro.status, Owner.kindFor(ro.status)) + '</div>';
      }).join('') : '<div class="hub-empty" data-i18n>No routes yet.</div>';
      if (window.AnejoI18n) window.AnejoI18n.refresh();
    });
  }

  function updateAssignBtn() {
    var n = document.querySelectorAll('#rorders .rorder:checked').length;
    var btn = document.getElementById('rassign');
    if (!btn) return;
    btn.disabled = !n;
    btn.textContent = n === 1 ? 'Assign 1 stop' : 'Assign ' + n + ' stops';
  }

  function doAssign() {
    var date = (document.getElementById('rdate') || {}).value || localToday();
    var driver = (document.getElementById('rdriver') || {}).value;
    var ids = Array.prototype.map.call(document.querySelectorAll('#rorders .rorder:checked'), function (cb) { return cb.value; });
    if (!driver || !ids.length) { Hub.toast('Pick a driver and at least one order.'); return; }
    var btn = document.getElementById('rassign'); btn.disabled = true;
    Hub.api('/api/hub/owner/routes', { method: 'POST', body: { driver_id: driver, route_date: date, order_ids: ids } }).then(function (r) {
      if (r && r.ok) { Hub.toast('Route assigned'); loadAssign(); loadToday(); }
      else { btn.disabled = false; Hub.toast((r && r.error) || 'Could not assign route'); }
    });
  }

  function render() {
    var root = document.getElementById('owner-root'); root.className = '';
    root.innerHTML =
      '<div class="hub-section"><h2 data-i18n>Assign a route</h2><div class="card">' +
      '<div class="field"><label data-i18n>Date</label><input type="date" id="rdate" value="' + localToday() + '"></div>' +
      '<div class="field"><label data-i18n>Driver</label><select id="rdriver"></select></div>' +
      '<div class="field"><label data-i18n>Unassigned orders</label><div id="rorders" class="list"><div class="hub-loading">…</div></div></div>' +
      '<button class="btn gold block" id="rassign" type="button" disabled data-i18n>Assign stops</button>' +
      '</div><div id="rexisting" class="list" style="margin-top:10px"></div></div>' +
      '<div class="hub-section"><h2>⚡ Smart route planner</h2><div class="card">' +
      '<div class="row-sub" style="margin-bottom:8px">Groups the date’s unassigned orders into the most efficient route(s) — minimizing driven miles &amp; time — and shows stops, miles, finish time, and what each route pays the driver.</div>' +
      '<button class="btn block" id="rplanbtn" type="button">⚡ Suggest efficient route(s)</button>' +
      '<div id="rplan" style="margin-top:10px"></div>' +
      paySettingsHtml() +
      '</div>' +
      autoDispatchHtml() +
      '</div>' +
      '<div id="roll"></div><div class="hub-section"><h2 data-i18n>Routes today</h2><div id="routes" class="list"><div class="hub-loading">…</div></div></div>' +
      '<div class="hub-section"><h2 data-i18n>Deliveries</h2><div id="drops" class="list"><div class="hub-loading">…</div></div></div>';

    document.getElementById('rdate').addEventListener('change', loadAssign);
    document.getElementById('rassign').addEventListener('click', doAssign);
    var pb = document.getElementById('rplanbtn'); if (pb) pb.addEventListener('click', planRoutes);
    loadAssign();
    loadPayCfg();
    loadAutoCfg();
    loadToday();
  }

  function loadToday() {
    Owner.get('/api/hub/owner/deliveries/today').then(function (d) {
      if (!d || !d.ok) { Owner.fail(); return; }
      var r = d.rollup;
      document.getElementById('roll').innerHTML = '<div class="card-grid">' + [
        Owner.tile(r.route_count, 'Routes'),
        Owner.tile(r.done, 'Completed', { accent: 'accent-green' }),
        Owner.tile(r.pending, 'Pending'),
        Owner.tile(r.failed, 'Failed', { accent: r.failed ? 'accent' : '' }),
        Owner.tile(r.on_time_pct == null ? '—' : (r.on_time_pct + '%'), 'On-time')
      ].join('') + '</div>';

      var etClock = function (ms) { try { return new Date(Number(ms)).toLocaleTimeString('en-US', { timeZone: 'America/New_York', hour: 'numeric', minute: '2-digit' }); } catch (e) { return ''; } };
      var routesEl = document.getElementById('routes');
      routesEl.innerHTML = d.routes.length ? d.routes.map(function (ro) {
        var p = ro.progress, live = '', counts = '';
        if (p && p.active) {
          var verb = p.active.status === 'arriving' ? 'arriving at' : 'en route to';
          live = '<div class="row-sub" style="color:var(--gold-700,#8a7a2e);font-weight:600">' + verb + ' ' + Owner.esc(p.active.name) +
            (p.active.eta_at ? ' · ETA ' + etClock(p.active.eta_at) : '') + '</div>';
        }
        if (p) counts = '<div class="row-sub">' + [p.done ? p.done + ' delivered' : '', (p.en_route + p.arriving) ? (p.en_route + p.arriving) + ' out' : '', p.picked ? p.picked + ' loaded' : '', p.failed ? p.failed + ' failed' : ''].filter(Boolean).join(' · ') + '</div>';
        var pay = ro.pay_cents != null ? '<b style="color:var(--green)">' + money(ro.pay_cents) + '</b> · ' : '';
        var fin = ro.eta_complete_at && ro.status !== 'completed' ? ' · done ~' + etClock(ro.eta_complete_at) : '';
        return '<div class="row"><div class="row-main"><div class="row-title">' + Owner.esc(ro.driver_name || 'Unassigned') +
          (ro.ai_optimized ? ' ⚡' : '') + '</div>' + live + counts +
          '<div class="row-sub">' + pay + Owner.esc((ro.stops_completed || 0) + '/' + (ro.stop_count || 0) + ' stops') +
          (ro.total_miles_est != null ? ' · ' + ro.total_miles_est + ' mi' : '') + fin + '</div></div>' +
          Owner.badge(ro.status, Owner.kindFor(ro.status)) + '</div>';
      }).join('') : '<div class="hub-empty" data-i18n>No routes today.</div>';

      var stars = function (n) { n = Number(n) || 0; var s = ''; for (var i = 0; i < 5; i++) s += i < n ? '★' : '☆'; return s; };
      var dropsEl = document.getElementById('drops');
      dropsEl.innerHTML = d.deliveries.length ? d.deliveries.map(function (dv) {
        var proof = dv.proof_photo && String(dv.proof_photo).indexOf('/api/hub/media/') === 0
          ? '<a href="' + Owner.esc(dv.proof_photo) + '" target="_blank" rel="noopener"><img src="' + Owner.esc(dv.proof_photo) + '" alt="proof" style="width:46px;height:46px;border-radius:8px;object-fit:cover;margin-left:8px"></a>'
          : (dv.proof_skipped ? '<span class="row-sub" style="margin-left:8px">no photo</span>' : '');
        var fb = dv.feedback_rating ? '<div class="row-sub" style="color:var(--gold-700,#8a7a2e)">' + stars(dv.feedback_rating) +
          (dv.feedback_comment ? ' “' + Owner.esc(String(dv.feedback_comment).slice(0, 80)) + '”' : '') + '</div>' : '';
        return '<div class="row"><div class="row-main"><div class="row-title">' + Owner.esc(dv.customer_name || dv.order_id || 'Delivery') + '</div>' +
          '<div class="row-sub">' + (dv.completed_at ? Owner.clock(dv.completed_at) : 'pending') +
          (dv.fail_reason ? ' · ' + Owner.esc(dv.fail_reason) : '') +
          (dv.on_time === 1 ? ' · on time' : dv.on_time === 0 ? ' · late' : '') + '</div>' + fb + '</div>' +
          Owner.badge(dv.status, Owner.kindFor(dv.status)) + proof + '</div>';
      }).join('') : '<div class="hub-empty" data-i18n>No deliveries today.</div>';
      if (window.AnejoI18n) window.AnejoI18n.refresh();
    });
  }

  Owner.init('deliveries', render);
})();
</script>
</body>
</html>
