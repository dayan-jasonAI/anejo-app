<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Añejo HUB · SMS Test</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#1b3a2b">
<link rel="icon" type="image/png" href="/assets/img/favicon.png">
<style>
  :root{ --green:#1b3a2b; --green-2:#24503b; --gold:#c8a24a; --ink:#16241d; --paper:#f6f3ec; --line:#e1dccf; --muted:#6b7269; }
  *{ box-sizing:border-box; }
  body{ margin:0; min-height:100dvh; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
        background:linear-gradient(160deg,var(--green),var(--green-2)); color:var(--ink);
        display:flex; align-items:flex-start; justify-content:center; padding:24px; }
  .card{ width:100%; max-width:440px; background:var(--paper); border-radius:18px; padding:26px 24px;
         box-shadow:0 20px 50px rgba(0,0,0,.35); margin-top:24px; }
  h1{ font-size:18px; letter-spacing:.08em; color:var(--green); margin:0 0 4px; }
  .sub{ font-size:13px; color:var(--muted); margin:0 0 18px; }
  label{ display:block; font-size:13px; font-weight:600; margin:14px 0 6px; }
  input,textarea{ width:100%; padding:13px; font-size:16px; border:1px solid var(--line); border-radius:11px; background:#fff; font-family:inherit; }
  input:focus,textarea:focus{ outline:none; border-color:var(--gold); box-shadow:0 0 0 3px rgba(200,162,74,.25); }
  button{ width:100%; margin-top:18px; padding:14px; font-size:16px; font-weight:700; color:#fff;
          background:var(--green); border:0; border-radius:11px; cursor:pointer; }
  button:hover{ background:var(--green-2); } button:disabled{ opacity:.5; cursor:not-allowed; }
  .msg{ margin-top:16px; padding:12px 14px; border-radius:10px; font-size:13.5px; line-height:1.5; display:none; white-space:pre-wrap; }
  .msg.err{ display:block; background:#fdecea; color:#8a1c12; border:1px solid #f3c0b9; }
  .msg.ok{ display:block; background:#e8f3ec; color:#1d5a36; border:1px solid #bfe0cc; }
  .msg.warn{ display:block; background:#fcf4d9; color:#7a5b13; border:1px solid #ecd99a; }
  .hint{ font-size:12px; color:var(--muted); margin-top:6px; }
  a{ color:var(--green-2); }
</style>
</head>
<body>
<div class="card">
  <h1>SMS Test</h1>
  <p class="sub">Owner-only. Fire a one-off text to confirm Twilio works end-to-end. Use your own mobile.</p>

  <label for="to">Mobile number</label>
  <input id="to" type="tel" inputmode="tel" placeholder="+15615551234" autocomplete="tel">
  <div class="hint">E.164 format with country code (e.g. +1 for US).</div>

  <label for="body">Message (optional)</label>
  <input id="body" type="text" maxlength="300" placeholder="Añejo HUB test — your Twilio SMS is working.">

  <button id="send" type="button">Send test SMS</button>
  <div id="msg" class="msg"></div>
</div>

<script>
(function(){
  var $ = function(id){ return document.getElementById(id); };
  var msg = $('msg');
  function show(cls, text){ msg.className = 'msg ' + cls; msg.textContent = text; }

  $('send').addEventListener('click', async function(){
    var to = $('to').value.trim();
    if(!to){ show('err','Enter a mobile number.'); return; }
    var btn = $('send'); btn.disabled = true; var lbl = btn.textContent; btn.textContent = 'Sending…';
    try {
      var r = await fetch('/api/hub/owner/sms-test', {
        method:'POST', headers:{'Content-Type':'application/json'}, credentials:'same-origin',
        body: JSON.stringify({ to: to, body: $('body').value.trim() })
      });
      if(r.status === 401){ show('err','Owner sign-in required. Open /login and sign in as owner, then retry.'); return; }
      if(r.status === 403){ show('err','This page is owner-only.'); return; }
      var d = await r.json().catch(function(){ return {}; });
      if(!r.ok){ show('err', d.error || ('Request failed ('+r.status+').')); return; }

      if(!d.twilio_configured){
        show('warn', 'Logged, but NOT actually sent — Twilio isn’t configured yet.\nSet TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN, and a sender (TWILIO_FROM or TWILIO_MESSAGING_SERVICE_SID) in Pages, then redeploy.\n(sms_log id: '+(d.sms_log_id||'—')+')');
      } else if(d.sent){
        show('ok', 'Sent! Check the phone. ✓\nprovider id: '+(d.provider_sid||'—')+'\nsms_log id: '+(d.sms_log_id||'—'));
      } else {
        show('err', 'Twilio is configured but the send failed:\n'+(d.error||'unknown')+'\n(sms_log id: '+(d.sms_log_id||'—')+')');
      }
    } catch(e){
      show('err', 'Network error: ' + ((e && e.message) || e));
    } finally {
      btn.disabled = false; btn.textContent = lbl;
    }
  });
})();
</script>
</body>
</html>
