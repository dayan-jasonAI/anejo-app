<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Añejo HUB · Kitchen</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#1b3a2b">
<link rel="manifest" href="/hub/manifest.webmanifest">
<link rel="apple-touch-icon" href="/assets/img/emblem.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Añejo Kitchen">
<link rel="stylesheet" href="/hub/assets/hub.css">
<style>
  .clock-card { display:flex; align-items:center; gap:12px; }
  .clock-card .grow { flex:1; }
  .board-col h2 { display:flex; justify-content:space-between; }
  .order-card .row-title { font-size:15px; }
  .order-actions { display:flex; gap:8px; margin-top:10px; }
  .order-actions .btn { flex:1; padding:10px; font-size:13px; }
  .rem .btn { padding:8px 12px; font-size:12px; }
  .order-items { list-style:none; margin:8px 0 0; padding:8px 0 0; border-top:1px solid var(--line); }
  .order-items li { font-size:13px; color:var(--green); padding:3px 0; display:flex; justify-content:space-between; gap:10px; }
  .order-items li .q { font-weight:700; color:var(--gold-700, #8a7a2e); }
  .order-items li.oi-head { font-weight:600; padding-top:7px; }
  .order-items li.oi-macros { display:block; font-size:12px; color:#444; padding:1px 0 0; }
  .order-items li.oi-macros b { color:var(--green); }
  .order-items li.oi-macros .oi-each { color:#9a9a8f; font-size:10px; text-transform:uppercase; letter-spacing:.5px; }
  .order-items li.oi-ing { display:block; font-size:11.5px; color:#6b7269; padding:1px 0 4px; line-height:1.4; }
  .order-items li.oi-ing b { color:#3a6b2e; }
  .order-items .oi-avo { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; color:#3a6b2e; background:#e7f0ea; border-radius:7px; padding:1px 6px; }
  .order-card { cursor:default; }
  .ord-filter { display:flex; gap:8px; margin:0 0 12px; }
  .ord-filter .chip { flex:1; display:flex; align-items:center; justify-content:center; gap:6px; padding:8px 6px;
    border:1px solid var(--line); border-radius:999px; background:var(--white); color:var(--green);
    font:600 13px/1 inherit; cursor:pointer; }
  .ord-filter .chip.active { background:var(--green-700); color:#fff; border-color:var(--green-700); }
  .ord-filter .chip .badge { background:rgba(0,0,0,.12); }
  .ord-filter .chip.active .badge { background:rgba(255,255,255,.22); color:#fff; }
</style>
</head>
<body>
<div class="hub-bar">
  <h1>AÑEJO · KITCHEN</h1>
  <div class="hub-bar-actions"><button id="lang-toggle" type="button">ES</button></div>
</div>

<div class="hub-wrap">
  <!-- Clock in/out -->
  <div class="hub-section">
    <div class="card accent clock-card" id="clock-card">
      <div class="grow">
        <div class="row-title" id="clock-status" data-i18n>Loading…</div>
        <div class="row-sub" id="clock-sub"></div>
      </div>
      <button class="btn gold" id="clock-btn" type="button" disabled>—</button>
    </div>
  </div>

  <!-- Today's reminders -->
  <div class="hub-section" id="rem-section" hidden>
    <h2 data-i18n>Today's reminders</h2>
    <div class="list" id="rem-list"></div>
  </div>

  <!-- Live order board -->
  <div class="hub-section">
    <h2 data-i18n>Live orders</h2>
    <div class="ord-filter" id="ord-filter">
      <button type="button" class="chip" data-scope="today"><span data-i18n>Today</span><span class="badge" id="f-today">0</span></button>
      <button type="button" class="chip" data-scope="upcoming"><span data-i18n>Upcoming</span><span class="badge" id="f-upcoming">0</span></button>
      <button type="button" class="chip active" data-scope="all"><span data-i18n>All</span><span class="badge" id="f-all">0</span></button>
    </div>
    <div class="board-col">
      <h2><span data-i18n>Pending</span><span class="badge" id="c-pending">0</span></h2>
      <div id="col-pending"></div>
    </div>
    <div class="board-col">
      <h2><span data-i18n>In prep</span><span class="badge warn" id="c-prep">0</span></h2>
      <div id="col-prep"></div>
    </div>
    <div class="board-col">
      <h2><span data-i18n>Ready</span><span class="badge ok" id="c-ready">0</span></h2>
      <div id="col-ready"></div>
    </div>
  </div>

  <!-- Incoming: upcoming confirmed orders (alerts the moment one is placed) -->
  <div class="hub-section" id="incoming-section" hidden>
    <h2><span data-i18n>Incoming orders</span><span class="badge" id="c-incoming">0</span></h2>
    <div id="col-incoming"></div>
  </div>

  <a class="btn ghost block" href="/hub/kitchen/summary.html" data-i18n>Daily summary</a>
  <a class="btn ghost block" href="/hub/kitchen/inventory.html" style="margin-top:8px">📦 <span data-i18n>Inventory</span></a>
  <a class="btn ghost block" href="/hub/comms.html" style="margin-top:8px">💬 <span data-i18n>Messages</span></a>
</div>

<div class="hub-install" id="hub-install">
  <div class="grow" data-i18n>Install Añejo Kitchen to your home screen.</div>
  <button class="btn gold" id="install-btn" type="button" data-i18n>Install</button>
  <button class="btn ghost" id="install-dismiss" type="button" aria-label="Dismiss">✕</button>
</div>

<script src="/assets/js/i18n.js"></script>
<script src="/hub/assets/hub.js"></script>
<script src="/hub/kitchen/kitchen.js"></script>
<script>
(function () {
  var Hub = window.Hub, K = window.Kitchen;
  var $ = Hub.$, esc = Hub.esc;
  var clockOpen = false;

  function refreshI18n() { if (window.AnejoI18n) window.AnejoI18n.refresh(); }

  // ---- New-order alert: sound (WebAudio chime) + browser notification + title flash ----
  var seenOrders = null;                                   // null until first load (no alert blast on open)
  var soundOn = (localStorage.getItem('anejo:kitchenSound') !== 'off');
  var audioCtx = null, bell = null;
  function getBell() { if (!bell) { try { bell = new Audio('/assets/audio/order-bell.wav'); bell.preload = 'auto'; } catch (e) {} } return bell; }
  function webChime() {                                  // fallback if the audio file can't play
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      var go = function () {
        var t = audioCtx.currentTime;
        [880, 1175, 1568].forEach(function (f, i) {
          var o = audioCtx.createOscillator(), g = audioCtx.createGain();
          o.type = 'sine'; o.frequency.value = f; var s = t + i * 0.16;
          g.gain.setValueAtTime(0.0001, s); g.gain.exponentialRampToValueAtTime(0.55, s + 0.02);
          g.gain.exponentialRampToValueAtTime(0.0001, s + 0.22);
          o.connect(g); g.connect(audioCtx.destination); o.start(s); o.stop(s + 0.24);
        });
      };
      if (audioCtx.state === 'suspended') audioCtx.resume().then(go).catch(function () {}); else go();
    } catch (e) {}
  }
  function unlockAudio() {                                // satisfy the browser's gesture requirement
    var b = getBell();
    if (b) { try { b.muted = true; var p = b.play(); if (p && p.then) p.then(function () { b.pause(); b.currentTime = 0; b.muted = false; }).catch(function () { b.muted = false; }); } catch (e) {} }
    try { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); } catch (e) {}
  }
  function chime() {                                      // play the bell file; fall back to WebAudio
    if (!soundOn) return;
    var b = getBell();
    if (b) { try { b.muted = false; b.currentTime = 0; var p = b.play(); if (p && p.catch) p.catch(function () { webChime(); }); return; } catch (e) {} }
    webChime();
  }
  function notify(title, body) {
    try { if ('Notification' in window && Notification.permission === 'granted') new Notification(title, { body: body, icon: '/assets/img/emblem.png', tag: 'anejo-order', renotify: true }); } catch (e) {}
  }
  var titleTimer = null, baseTitle = document.title;
  function flashTitle(n) {
    document.title = '🔔 ' + n + ' new order' + (n > 1 ? 's' : '') + '!';
    clearTimeout(titleTimer); titleTimer = setTimeout(function () { document.title = baseTitle; }, 8000);
  }
  function announceNew(list) {
    chime(); setTimeout(chime, 850);                  // ring twice for attention
    var first = list[0];
    if (window.Hub && Hub.toast) Hub.toast('🔔 New order — ' + (first.customer_name || 'Order'));
    notify('New order — ' + (first.customer_name || 'Order'), list.length + ' new · ' + (first.item_count || 0) + ' items');
    flashTitle(list.length);
  }
  function setupSound() {
    var sb = document.createElement('button');
    sb.id = 'sound-toggle'; sb.type = 'button'; sb.className = 'btn ghost';
    function paint() { sb.textContent = soundOn ? '🔔' : '🔕'; sb.setAttribute('aria-label', soundOn ? 'Order sound on' : 'Order sound off'); sb.title = soundOn ? 'Order sound on' : 'Order sound off'; }
    paint();
    sb.addEventListener('click', function () {
      soundOn = !soundOn; localStorage.setItem('anejo:kitchenSound', soundOn ? 'on' : 'off'); paint();
      if (soundOn) { unlockAudio(); if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission(); chime(); }
    });
    var lt = $('#lang-toggle');
    if (lt && lt.parentNode) lt.parentNode.insertBefore(sb, lt); else document.body.appendChild(sb);
    document.addEventListener('click', unlockAudio, { once: true });   // unlock audio on first tap
  }

  function renderClock(shift) {
    clockOpen = !!shift;
    var btn = $('#clock-btn'); btn.disabled = false;
    if (shift) {
      var since = new Date(Number(shift.clock_in_at));
      $('#clock-status').textContent = 'Clocked in';
      $('#clock-sub').textContent = 'Since ' + since.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      btn.textContent = 'Clock out';
      btn.className = 'btn ghost';
    } else {
      $('#clock-status').textContent = 'Clocked out';
      $('#clock-sub').textContent = 'Tap to start your shift';
      btn.textContent = 'Clock in';
      btn.className = 'btn gold';
    }
  }

  function loadClock() {
    K.get('/api/hub/kitchen/clock-out').then(function (d) { renderClock(d && d.shift); });
  }

  $('#clock-btn').addEventListener('click', function () {
    var btn = this; btn.disabled = true;
    if (clockOpen) {
      K.geo().then(function (geo) {
        return K.post('/api/hub/kitchen/clock-out', { geo: geo });
      }).then(function (d) {
        if (d && d.ok) { Hub.toast('Clocked out'); renderClock(null); } else K.fail(d, 'Could not clock out.');
        btn.disabled = false;
      });
    } else {
      K.geo().then(function (geo) {
        return K.post('/api/hub/kitchen/clock-in', { geo: geo });
      }).then(function (d) {
        if (d && d.shift) { Hub.toast('Clocked in'); renderClock(d.shift); } else K.fail(d, 'Could not clock in.');
        btn.disabled = false;
      });
    }
  });

  function reminderRow(r) {
    return '<div class="row rem"><div class="row-main"><div class="row-title">' + esc(r.title || r.reminder_type) +
      '</div>' + (r.body ? '<div class="row-sub">' + esc(r.body) + '</div>' : '') +
      '</div><button class="btn gold" data-ack="' + esc(r.id) + '">Got it</button></div>';
  }

  function loadReminders() {
    K.get('/api/hub/kitchen/reminders').then(function (d) {
      var list = (d && d.reminders) || [];
      if (!list.length) { $('#rem-section').hidden = true; return; }
      $('#rem-section').hidden = false;
      $('#rem-list').innerHTML = list.map(reminderRow).join('');
      Array.prototype.forEach.call(document.querySelectorAll('[data-ack]'), function (b) {
        b.addEventListener('click', function () {
          var id = b.getAttribute('data-ack'); b.disabled = true;
          K.post('/api/hub/kitchen/reminders', { id: id }).then(function (res) {
            if (res && res.ok) { Hub.toast('Acknowledged'); loadReminders(); } else { K.fail(res); b.disabled = false; }
          });
        });
      });
    });
  }

  // Render the order's actual contents so the kitchen sees WHAT to make AND the exact per-bowl
  // spec for this client: portion size, the macros that bowl must hit, its ingredients, and the
  // avocado add-on — so they prep the right weights and we hold the right stock.
  function orderItems(o) {
    var items = [];
    try { items = JSON.parse(o.items || '[]'); } catch (e) {}
    if (!Array.isArray(items) || !items.length) return '';
    return '<ul class="order-items">' + items.map(function (it) {
      var qty = Number(it && it.qty) || 1;
      var name = (it && (it.name || it.id)) || 'Item';
      var size = (it && it.size_oz) ? (' · ' + it.size_oz + ' oz' + (it.size_pct ? ' (' + it.size_pct + '%)' : '')) : '';
      var head = '<li class="oi-head"><span>' + esc(name) + (it && it.avocado ? ' <span class="oi-avo">+ ½ avocado</span>' : '') + size + '</span><span class="q">×' + qty + '</span></li>';
      var detail = '';
      var m = it && it.macros;
      if (m) {
        detail += '<li class="oi-macros"><b>' + (m.kcal||'—') + '</b> kcal · ' + (m.protein_g||0) + 'P / ' + (m.carbs_g||0) + 'C / ' + (m.fat_g||0) + 'F' + (m.fiber_g!=null ? ' · ' + m.fiber_g + ' fiber' : '') + ' <span class="oi-each">per bowl</span></li>';
      }
      if (it && Array.isArray(it.ingredients) && it.ingredients.length) {
        detail += '<li class="oi-ing">' + esc(it.ingredients.join(' · ')) + (it.avocado ? ' · <b>½ avocado</b> (reduce other fats to keep target)' : '') + '</li>';
      }
      return head + detail;
    }).join('') + '</ul>';
  }

  function orderCard(o, stage) {
    var actions = '';
    if (stage === 'pending') actions = '<div class="order-actions"><button class="btn gold" data-prep="' + esc(o.id) + '">Start prep</button></div>';
    else if (stage === 'prep') actions = '<div class="order-actions"><button class="btn" data-ready="' + esc(o.id) + '">Mark ready</button></div>';
    var win = o.delivery_window ? ('<span class="badge">' + esc(o.delivery_window) + '</span>') : '';
    var dt = o.delivery_date ? ('<span class="badge ok">' + esc(o.delivery_date) + '</span>') : '';
    return '<div class="card order-card"><div class="row" style="padding:0;border:none">' +
      '<div class="row-main"><div class="row-title">' + esc(o.customer_name || 'Order') + ' · ' + (o.item_count || 0) + ' items</div>' +
      '<div class="row-sub">' + esc(o.id) + '</div></div>' + dt + win + '</div>' +
      orderItems(o) + actions + '</div>';
  }

  function bindOrderActions() {
    Array.prototype.forEach.call(document.querySelectorAll('[data-prep]'), function (b) {
      b.addEventListener('click', function () {
        b.disabled = true;
        K.post('/api/hub/kitchen/orders', { id: b.getAttribute('data-prep'), action: 'prep_start' })
          .then(function (d) { if (d && d.ok) { Hub.toast('Prep started'); loadBoard(); } else { K.fail(d); b.disabled = false; } });
      });
    });
    Array.prototype.forEach.call(document.querySelectorAll('[data-ready]'), function (b) {
      b.addEventListener('click', function () {
        b.disabled = true;
        K.post('/api/hub/kitchen/orders', { id: b.getAttribute('data-ready'), action: 'mark_ready' })
          .then(function (d) { if (d && d.ok) { Hub.toast('Marked ready'); loadBoard(); } else { K.fail(d); b.disabled = false; } });
      });
    });
  }

  function fillCol(elId, list, stage) {
    var el = $('#' + elId);
    el.innerHTML = list.length ? list.map(function (o) { return orderCard(o, stage); }).join('')
      : '<div class="hub-empty" data-i18n>Nothing here.</div>';
  }

  function incomingCard(o) {
    var win = o.delivery_window ? ('<span class="badge">' + esc(o.delivery_window) + '</span>') : '';
    var dt = o.delivery_date ? ('<span class="badge ok">' + esc(o.delivery_date) + '</span>') : '';
    return '<div class="card order-card"><div class="row" style="padding:0;border:none">' +
      '<div class="row-main"><div class="row-title">' + esc(o.customer_name || 'Order') + ' · ' + (o.item_count || 0) + ' items</div>' +
      '<div class="row-sub">' + esc(o.id) + '</div></div>' + dt + win + '</div>' + orderItems(o) + '</div>';
  }

  // ---- Date scope filter (Today / Upcoming / All) ----
  var lastBoard = { pending: [], prep: [], ready: [] };
  var scope = localStorage.getItem('anejo:kitchenScope') || 'all';
  function todayStr() { try { return new Date().toLocaleDateString('en-CA'); } catch (e) { return new Date().toISOString().slice(0, 10); } }
  // 'today' bucket = due today, overdue, or undated (needs attention now); 'upcoming' = future.
  function scopeOf(o) { var d = o.delivery_date; if (!d) return 'today'; return d > todayStr() ? 'upcoming' : 'today'; }
  function inScope(list) { return scope === 'all' ? list : list.filter(function (o) { return scopeOf(o) === scope; }); }

  function renderBoard() {
    var b = lastBoard;
    var all = b.pending.concat(b.prep, b.ready);
    var nToday = all.filter(function (o) { return scopeOf(o) === 'today'; }).length;
    var nUp = all.filter(function (o) { return scopeOf(o) === 'upcoming'; }).length;
    if ($('#f-today')) $('#f-today').textContent = nToday;
    if ($('#f-upcoming')) $('#f-upcoming').textContent = nUp;
    if ($('#f-all')) $('#f-all').textContent = all.length;
    var p = inScope(b.pending), pr = inScope(b.prep), rd = inScope(b.ready);
    $('#c-pending').textContent = p.length;
    $('#c-prep').textContent = pr.length;
    $('#c-ready').textContent = rd.length;
    fillCol('col-pending', p, 'pending');
    fillCol('col-prep', pr, 'prep');
    fillCol('col-ready', rd, 'ready');
    Array.prototype.forEach.call(document.querySelectorAll('#ord-filter .chip'), function (c) {
      c.classList.toggle('active', c.getAttribute('data-scope') === scope);
    });
    bindOrderActions();
    refreshI18n();
  }

  function loadBoard() {
    K.get('/api/hub/kitchen/orders?surface=1').then(function (d) {
      var b = (d && d.board) || { pending: [], prep: [], ready: [] };
      var inc = (d && d.incoming) || [];
      // Sound alert when a NEW confirmed order arrives.
      var arrivals = b.pending.concat(inc);
      var fresh = arrivals.filter(function (o) { return seenOrders && !seenOrders[o.id]; });
      if (seenOrders && fresh.length) announceNew(fresh);
      if (!seenOrders) seenOrders = {};
      b.pending.concat(b.prep, b.ready, inc).forEach(function (o) { seenOrders[o.id] = 1; });
      lastBoard = b;
      renderBoard();
      var incCount = $('#c-incoming'); if (incCount) incCount.textContent = inc.length;
      var incSec = $('#incoming-section'); if (incSec) incSec.hidden = inc.length === 0;
      var incCol = $('#col-incoming'); if (incCol) incCol.innerHTML = inc.length ? inc.map(incomingCard).join('') : '';
    });
  }

  // Wire the scope chips (re-render instantly from cached data; no refetch).
  Array.prototype.forEach.call(document.querySelectorAll('#ord-filter .chip'), function (c) {
    c.addEventListener('click', function () {
      scope = c.getAttribute('data-scope') || 'all';
      localStorage.setItem('anejo:kitchenScope', scope);
      renderBoard();
    });
  });

  // Language toggle
  var lt = $('#lang-toggle');
  if (lt && window.AnejoLang) {
    lt.textContent = window.AnejoLang.get() === 'es' ? 'EN' : 'ES';
    lt.addEventListener('click', function () {
      var next = window.AnejoLang.get() === 'es' ? 'en' : 'es';
      window.AnejoLang.set(next); lt.textContent = next === 'es' ? 'EN' : 'ES';
    });
  }
  var dismiss = document.getElementById('install-dismiss');
  if (dismiss) dismiss.addEventListener('click', Hub.dismissInstall);

  K.boot('board', function () {
    setupSound();
    loadClock(); loadReminders(); loadBoard();
    setInterval(loadBoard, 15000); // poll the board (15s → snappier order alerts)
  });
})();
</script>
</body>
</html>
