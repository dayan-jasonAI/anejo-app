<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Añejo HUB — Staff Training</title>
<meta name="robots" content="noindex">
<style>
  :root{
    --green:#1A3D2E; --green-700:#15311f; --gold:#C6A85B; --gold-700:#8a7a2e;
    --cream:#F5F2EC; --paper:#fffdf8; --ink:#21302a; --muted:#6f7b74; --line:#e3ddcf;
    --crit:#b3402f; --ok:#1A3D2E;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
  .bar{background:var(--green);color:var(--cream);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5}
  .bar h1{font-size:16px;letter-spacing:2px;margin:0;font-weight:700}
  .bar h1 b{color:var(--gold)}
  .lang{display:flex;gap:0;border:1px solid rgba(245,242,236,.4);border-radius:20px;overflow:hidden;font-size:12px;font-weight:700}
  .lang button{background:transparent;color:var(--cream);border:0;padding:5px 11px;cursor:pointer}
  .lang button.on{background:var(--gold);color:var(--green)}
  .roles{display:flex;gap:6px;padding:12px 14px;flex-wrap:wrap;background:var(--paper);border-bottom:1px solid var(--line);position:sticky;top:52px;z-index:4}
  .roles button{flex:1;min-width:84px;border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:9px 6px;font-weight:700;font-size:13px;color:var(--ink);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
  .roles button .ic{font-size:18px}
  .roles button.on{background:var(--green);color:#fff;border-color:var(--green)}
  .stage{flex:1;padding:18px 16px 26px}
  .prog{display:flex;gap:6px;margin-bottom:14px;align-items:center}
  .dot{height:6px;border-radius:3px;background:var(--line);flex:1;transition:background .2s}
  .dot.done{background:var(--gold)} .dot.cur{background:var(--green)}
  .scene{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 6px 22px rgba(26,61,46,.06)}
  .scene .kicker{font-size:11px;font-weight:800;letter-spacing:1.5px;color:var(--gold-700);text-transform:uppercase}
  .scene h2{margin:4px 0 12px;font-size:21px;color:var(--green);line-height:1.2}
  .mock{background:var(--cream);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px;min-height:120px}
  .vo{font-size:15px;line-height:1.55;margin:0 0 12px}
  .points{list-style:none;padding:0;margin:0}
  .points li{position:relative;padding:6px 0 6px 26px;font-size:14px;line-height:1.45;color:#33403a;border-bottom:1px dashed var(--line)}
  .points li:last-child{border-bottom:0}
  .points li::before{content:"✓";position:absolute;left:0;top:6px;color:var(--gold-700);font-weight:800}
  .nav{display:flex;gap:10px;margin-top:16px}
  .btn{flex:1;border:0;border-radius:12px;padding:13px;font-size:15px;font-weight:700;cursor:pointer}
  .btn.gold{background:var(--gold);color:var(--green)}
  .btn.ghost{background:#fff;border:1.5px solid var(--line);color:var(--ink)}
  .btn:disabled{opacity:.4;cursor:default}
  .btn.play{background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;gap:8px}
  .scene{animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .scene.playing{box-shadow:0 0 0 2px var(--gold),0 10px 30px rgba(26,61,46,.12)}
  .scene.playing .vo{background:#fff8e9;border-radius:8px;padding:10px;margin:-2px 0 12px;box-shadow:inset 0 0 0 1px var(--line)}
  .scount{text-align:center;font-size:12px;color:var(--muted);margin-top:10px}
  /* mock pieces echoing the real HUB */
  .m-nav{display:flex;background:var(--green-700);border-radius:10px;overflow:hidden}
  .m-nav span{flex:1;text-align:center;color:rgba(245,242,236,.7);font-size:10px;padding:8px 2px}
  .m-nav span.on{color:var(--gold)} .m-nav span i{display:block;font-size:16px;font-style:normal}
  .m-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px;margin:6px 0}
  .m-row{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .m-title{font-weight:700;color:var(--green);font-size:14px}
  .m-sub{font-size:12px;color:var(--muted)}
  .m-badge{display:inline-block;font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px;background:#eee;color:#555}
  .m-badge.sub{background:var(--gold);color:var(--green)} .m-badge.ok{background:#dcebe0;color:var(--green)}
  .m-badge.win{background:#efe7cf;color:var(--gold-700)} .m-badge.crit{background:#f3d9d3;color:var(--crit)}
  .m-btn{display:block;text-align:center;background:var(--gold);color:var(--green);font-weight:700;border-radius:9px;padding:9px;font-size:13px;margin-top:8px}
  .m-btn.green{background:var(--green);color:#fff}
  .m-pin{display:flex;gap:6px;justify-content:center;margin-top:8px}
  .m-pin b{width:34px;height:40px;border:1.5px solid var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;background:#fff;font-size:18px}
  .m-units{display:flex;gap:5px;margin-top:6px}
  .m-units b{width:26px;height:26px;border:1.5px solid var(--line);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;background:#fff}
  .m-units b.on{background:var(--green);color:#fff;border-color:var(--green)}
  .done-card{text-align:center;padding:10px}
  .done-card .em{font-size:40px}
</style>
</head>
<body>
<div class="wrap">
  <div class="bar">
    <h1>AÑEJO <b>·</b> TRAINING</h1>
    <div class="lang"><button id="en" class="on" onclick="setLang('en')">EN</button><button id="es" onclick="setLang('es')">ES</button></div>
  </div>
  <div class="roles" id="roles"></div>
  <div class="stage">
    <div class="prog" id="prog"></div>
    <div class="scene" id="scene"></div>
    <div class="nav">
      <button class="btn ghost" id="back" onclick="go(-1)">← <span data-t="back">Back</span></button>
      <button class="btn gold" id="next" onclick="go(1)"><span data-t="next">Next</span> →</button>
    </div>
    <button class="btn play" id="play" onclick="togglePlay()" style="width:100%;margin-top:10px">▶ Play narrated tour</button>
    <div class="scount" id="scount"></div>
  </div>
</div>
<script>
/* ---- bilingual UI strings ---- */
var T = {
  back:{en:'Back',es:'Atrás'}, next:{en:'Next',es:'Siguiente'}, finish:{en:'Finish',es:'Terminar'},
  scene:{en:'Step',es:'Paso'}, of:{en:'of',es:'de'}
};
var ROLES = [
  { key:'everyone', ic:'👋', en:'Everyone', es:'Todos' },
  { key:'kitchen',  ic:'🍳', en:'Kitchen',  es:'Cocina' },
  { key:'driver',   ic:'🚚', en:'Driver',   es:'Conductor' },
  { key:'owner',    ic:'◎',  en:'Owner',    es:'Dueño' }
];
/* helper to build a scene */
function S(kicker, en, es, mock){ return { kicker:kicker, en:en, es:es, mock:mock }; }

var TOUR = {
  everyone: [
    S({en:'Welcome',es:'Bienvenido'},
      {h:'This is the HUB',vo:'The Añejo HUB is the one place we run the business — kitchen, delivery, and owner. Add it to your phone’s home screen so it opens like a real app and can send you notifications.',pts:['Open anejocateringco.com/login','Add to Home Screen (do this once)','Open the Añejo icon like any app']},
      {h:'Esto es el HUB',vo:'El HUB de Añejo es donde operamos todo el negocio — cocina, entregas y dueño. Agrégalo a la pantalla de inicio de tu teléfono para que abra como una app y te envíe notificaciones.',pts:['Abre anejocateringco.com/login','Agregar a pantalla de inicio (una sola vez)','Abre el ícono de Añejo como cualquier app']},
      '<div class="m-card"><div class="m-title">Añejo HUB</div><div class="m-sub">anejocateringco.com/login</div><div class="m-btn green">＋ Add to Home Screen</div></div>'),
    S({en:'Your PIN',es:'Tu PIN'},
      {h:'Sign in with your own PIN',vo:'Everyone has a personal login — never share it. Enter your phone or email, then your 6-digit PIN. Your PIN is your signature: the HUB records who does what.',pts:['Phone or email → Continue','Enter your 6-digit PIN','5 wrong tries = locked 15 min','Never share your PIN']},
      {h:'Entra con tu propio PIN',vo:'Cada quien tiene su acceso personal — nunca lo compartas. Escribe tu teléfono o correo y tu PIN de 6 dígitos. Tu PIN es tu firma: el HUB registra quién hace cada cosa.',pts:['Teléfono o correo → Continuar','Escribe tu PIN de 6 dígitos','5 intentos fallidos = bloqueo 15 min','Nunca compartas tu PIN']},
      '<div class="m-card"><div class="m-sub">Enter your PIN</div><div class="m-pin"><b>•</b><b>•</b><b>•</b><b>•</b><b>•</b><b>•</b></div><div class="m-btn">Sign in</div></div>'),
    S({en:'Getting around',es:'Navegación'},
      {h:'The bottom bar',vo:'Wherever you are, the bar at the bottom switches between your pages. It never moves, so you never scroll to find it. Comms is our group line, and Account is where you turn on notifications and switch English or Spanish.',pts:['Bottom bar = your menu, always visible','Comms = messages from the owner','Account = notifications, change PIN, EN/ES']},
      {h:'La barra inferior',vo:'Estés donde estés, la barra de abajo cambia entre tus páginas. Nunca se mueve, así que no tienes que buscarla. Comms es nuestra línea de grupo, y Cuenta es donde activas notificaciones y cambias inglés o español.',pts:['Barra inferior = tu menú, siempre visible','Comms = mensajes del dueño','Cuenta = notificaciones, cambiar PIN, EN/ES']},
      '<div class="m-nav"><span class="on"><i>🏠</i>Today</span><span><i>🗺️</i>Route</span><span><i>💬</i>Comms</span><span><i>👤</i>Account</span></div>')
  ],
  kitchen: [
    S({en:'Start of shift',es:'Inicio de turno'},
      {h:'Clock in → morning briefing',vo:'Start every shift by clocking in. The first cook to clock in triggers the morning briefing from Añejo Ops — today’s bowl count, the lunch and dinner split, and anything low on stock. Read it before you prep.',pts:['Tap the green Clock-in card','Read the ☀️ morning briefing banner','It shows today’s bowls + low stock']},
      {h:'Marca entrada → resumen',vo:'Empieza cada turno marcando entrada. El primer cocinero en marcar activa el resumen de la mañana de Añejo Ops — el total de bowls de hoy, el reparto de almuerzo y cena, y lo que esté bajo de inventario. Léelo antes de preparar.',pts:['Toca la tarjeta verde de entrada','Lee el aviso ☀️ del resumen','Muestra los bowls de hoy + bajo inventario']},
      '<div class="m-card" style="background:#fff8e9;border-color:var(--gold)"><div class="m-title">☀️ Good morning — today</div><div class="m-sub">28 bowls (16 lunch / 12 dinner). ⚠ 2 below par: avocado, quinoa.</div></div>'),
    S({en:'The board',es:'El tablero'},
      {h:'Pending → Prep → Ready',vo:'Orders flow left to right. A gold “Subscription” tag is a member’s daily fresh bowl. The badges show the day and whether it’s lunch or dinner. New orders chime.',pts:['Three columns: Pending, Prep, Ready','Gold “Subscription” = member’s daily bowl','Lunch / dinner badge on every card']},
      {h:'Pendiente → Prep → Listo',vo:'Los pedidos van de izquierda a derecha. La etiqueta dorada “Subscription” es el bowl diario de un miembro. Las insignias muestran el día y si es almuerzo o cena. Los pedidos nuevos suenan.',pts:['Tres columnas: Pendiente, Prep, Listo','Dorado “Subscription” = bowl diario de miembro','Insignia de almuerzo / cena en cada tarjeta']},
      '<div class="m-card"><div class="m-row"><span class="m-title">Maria G. · 1 item</span><span class="m-badge sub">Subscription</span></div><div class="m-row" style="margin-top:6px"><span class="m-badge ok">2026-06-15</span><span class="m-badge win">lunch</span></div></div>'),
    S({en:'Per-bowl detail',es:'Detalle del bowl'},
      {h:'Read every bowl in full',vo:'Tap an order to see each bowl exactly: the size scaled to that member’s macros, the ingredient build with weights, anything removed, any add-ons like half an avocado, and special notes. Make exactly what the card says — the weights matter.',pts:['Size (oz) + size % scaled to their macros','Build list with exact weights','Removals, add-ons (+ ½ avocado), notes']},
      {h:'Lee cada bowl completo',vo:'Toca un pedido para ver cada bowl exacto: el tamaño ajustado a los macros del miembro, la lista de ingredientes con pesos, lo que se quita, los extras como medio aguacate, y notas especiales. Haz exactamente lo que dice la tarjeta — los pesos importan.',pts:['Tamaño (oz) + % según sus macros','Lista de ingredientes con pesos exactos','Quitados, extras (+ ½ aguacate), notas']},
      '<div class="m-card"><div class="m-title">FUEGO Bowl · 18oz (112%)</div><div class="m-sub">Steak 5.6oz · Quinoa 3.4oz · Arugula 1.1oz…</div><div class="m-sub" style="color:var(--crit)">− no pickled onion</div><div class="m-sub" style="color:var(--gold-700)">+ ½ avocado</div></div>'),
    S({en:'Prep + check-offs',es:'Prep + marcado'},
      {h:'Check off each bowl (PIN)',vo:'Tap Start Prep to claim the order. As you finish each bowl, check it off — the HUB asks for your PIN, so we always know who made what. The driver re-confirms these later, so be honest.',pts:['Start Prep → order moves to Prep','Check each bowl as you finish it','Your PIN confirms it → “✓ by Jorge”']},
      {h:'Marca cada bowl (PIN)',vo:'Toca Empezar Prep para tomar el pedido. Al terminar cada bowl, márcalo — el HUB pide tu PIN, así siempre sabemos quién lo hizo. El conductor lo reconfirma después, así que sé honesto.',pts:['Empezar Prep → el pedido pasa a Prep','Marca cada bowl al terminarlo','Tu PIN lo confirma → “✓ por Jorge”']},
      '<div class="m-card"><div class="m-title">Maria G. — prep</div><div class="m-units"><b class="on">✓</b><b class="on">✓</b><b>○</b></div><div class="m-sub" style="margin-top:6px">Tap a bowl → enter PIN</div></div>'),
    S({en:'Mark ready',es:'Marcar listo'},
      {h:'Ready is gated + PIN',vo:'You can’t mark an order Ready until every bowl is checked off — on purpose. When it’s all done, Mark Ready, confirm your PIN, and it’s set out for the driver.',pts:['All bowls checked first (or it’s blocked)','Mark Ready → enter your PIN','Order moves to Ready for the driver']},
      {h:'Listo es bloqueado + PIN',vo:'No puedes marcar un pedido Listo hasta que todos los bowls estén marcados — a propósito. Cuando todo esté hecho, Marca Listo, confirma tu PIN, y queda para el conductor.',pts:['Primero todos los bowls marcados (o se bloquea)','Marcar Listo → escribe tu PIN','El pedido pasa a Listo para el conductor']},
      '<div class="m-card"><div class="m-title">Maria G.</div><div class="m-units"><b class="on">✓</b><b class="on">✓</b><b class="on">✓</b></div><div class="m-btn green">Mark Ready</div></div>'),
    S({en:'Inventory & more',es:'Inventario y más'},
      {h:'Counts, checklists, Studio',vo:'Keep counts current — anything below par turns red and feeds the owner’s vendor-order suggestions. Open and close the kitchen by the Checklists. The Library has every recipe and manual. Creative Studio develops new bowls with our brand-trained AI sous-chef. Finish your shift with EOD and clock out.',pts:['Inventory: update on-hand; set unit cost','Checklists keep us food-safe','Library = recipes & manuals · Studio = new bowls','File EOD + clock out']},
      {h:'Conteos, listas, Studio',vo:'Mantén los conteos al día — lo que esté bajo de par se pone rojo y alimenta las sugerencias de pedido del dueño. Abre y cierra la cocina con las Listas. La Biblioteca tiene recetas y manuales. Creative Studio desarrolla bowls nuevos con nuestro chef IA entrenado en la marca. Termina con EOD y marca salida.',pts:['Inventario: actualiza existencias; pon costo','Las Listas nos mantienen seguros','Biblioteca = recetas · Studio = bowls nuevos','Envía EOD + marca salida']},
      '<div class="m-card"><div class="m-row"><span class="m-title">Avocado</span><span class="m-badge crit">below par</span></div><div class="m-sub">on hand 3 · par 12 · $0.90/ea</div></div>')
  ],
  driver: [
    S({en:'New order',es:'Pedido nuevo'},
      {h:'Accept or deny',vo:'When the owner assigns you a run, you get a notification and a text. Open the app and Accept or Deny. If you deny — or don’t answer within two minutes — it goes to the next available driver automatically. Every accept and deny is on your record.',pts:['Push + text: “New delivery order”','Accept order, or Deny','No answer in 2 min → next driver','Be reliable — it’s tracked']},
      {h:'Aceptar o rechazar',vo:'Cuando el dueño te asigna una ruta, recibes una notificación y un texto. Abre la app y Acepta o Rechaza. Si rechazas — o no respondes en dos minutos — pasa al siguiente conductor disponible. Cada aceptación y rechazo queda en tu registro.',pts:['Push + texto: “Nuevo pedido de entrega”','Aceptar pedido, o Rechazar','Sin respuesta en 2 min → otro conductor','Sé confiable — se registra']},
      '<div class="m-card"><div class="m-title">New delivery order</div><div class="m-sub">4 stops on 2026-06-15</div><div class="m-btn green">✅ Accept order</div><div class="m-btn" style="background:#fff;border:1.5px solid var(--line);color:var(--ink)">Deny</div></div>'),
    S({en:'Pickup',es:'Recogida'},
      {h:'Confirm every bowl',vo:'Before you leave, load and confirm every bowl — tap each one as it goes in the bag. You’re re-confirming what the kitchen prepped. If something’s short, flag it and the kitchen is alerted. You can’t start deliveries until pickup is confirmed.',pts:['Tap each bowl as you load it','Confirm pickup per stop','Short? Flag it → kitchen alerted','No deliveries until confirmed']},
      {h:'Confirma cada bowl',vo:'Antes de salir, carga y confirma cada bowl — toca cada uno al ponerlo en la bolsa. Estás reconfirmando lo que preparó la cocina. Si falta algo, márcalo y se avisa a la cocina. No puedes empezar entregas hasta confirmar la recogida.',pts:['Toca cada bowl al cargarlo','Confirma la recogida por parada','¿Falta? Márcalo → se avisa a la cocina','Sin entregas hasta confirmar']},
      '<div class="m-card"><div class="m-title">Maria G. · 3 bowls</div><div class="m-units"><b class="on">✓</b><b class="on">✓</b><b>○</b></div><div class="m-btn green">Confirm pickup</div></div>'),
    S({en:'On the road',es:'En ruta'},
      {h:'Navigate → on the way',vo:'Tap Navigate for each stop — it opens directions and automatically texts that customer you’re on the way. Work the stops top to bottom.',pts:['Navigate opens maps','Customer auto-texted “on the way”','Work stops in order']},
      {h:'Navegar → en camino',vo:'Toca Navegar en cada parada — abre las direcciones y le avisa por texto al cliente que vas en camino. Haz las paradas de arriba hacia abajo.',pts:['Navegar abre el mapa','Al cliente se le avisa “en camino”','Haz las paradas en orden']},
      '<div class="m-card" style="background:#fff8e9;border-color:var(--gold)"><div class="m-title">Maria G. <span class="m-sub">ETA 7:38 PM</span></div><div class="m-sub">1234 Main St, Lake Worth</div><div class="m-btn green">🧭 Navigate (notify customer)</div></div>'),
    S({en:'At the door',es:'En la puerta'},
      {h:'Photo → Mark delivered',vo:'At the door, take a quick proof photo and Mark delivered. The customer gets a text it’s dropped, and the app jumps to your next stop. No photo? Check the box and it still completes.',pts:['Take a proof photo','Mark delivered → customer texted','Auto-advances to next stop','No photo? Check the box']},
      {h:'Foto → Marcar entregado',vo:'En la puerta, toma una foto de prueba y Marca entregado. El cliente recibe un texto, y la app salta a la siguiente parada. ¿Sin foto? Marca la casilla y se completa igual.',pts:['Toma una foto de prueba','Marcar entregado → se avisa al cliente','Avanza solo a la siguiente parada','¿Sin foto? Marca la casilla']},
      '<div class="m-card"><div class="m-title">📷 Mark delivered</div><div class="m-sub">Take a photo at the door</div><div class="m-btn green">Mark delivered</div></div>'),
    S({en:'Wrap up',es:'Cierre'},
      {h:'Problems, temps, expenses, EOD',vo:'If a drop fails, Report a problem and pick the reason — the owner sees it instantly. Log cooler temps when asked, snap fuel and expense receipts under Expenses, and finish with your EOD. Complete the route when every stop is done.',pts:['Report a problem: no answer / wrong address / refused','Log cooler temps','Expenses = fuel + receipt photo','Complete route → file EOD']},
      {h:'Problemas, temps, gastos, EOD',vo:'Si una entrega falla, Reporta un problema y elige la razón — el dueño lo ve al instante. Registra temperaturas cuando se pida, sube recibos de gasolina en Gastos, y termina con tu EOD. Completa la ruta cuando todas las paradas estén hechas.',pts:['Reportar problema: sin respuesta / dirección / rechazado','Registra temperaturas del cooler','Gastos = gasolina + foto del recibo','Completar ruta → enviar EOD']},
      '<div class="m-card"><div class="m-sub">Report a problem</div><div class="m-row" style="margin-top:6px"><span class="m-badge">No answer</span><span class="m-badge">Wrong address</span><span class="m-badge">Refused</span></div></div>')
  ],
  owner: [
    S({en:'Overview',es:'Resumen'},
      {h:'Your command center',vo:'The Overview is your morning glance — orders, deliveries, and open alerts. The Activity feed shows everything happening and stays compact so your menu’s always reachable.',pts:['Tiles: orders, deliveries, alerts','Activity feed (Expand for more)','Bottom bar: Overview, Customers, Deliveries, Kitchen, Staff, Finance, Comms']},
      {h:'Tu centro de mando',vo:'El Resumen es tu vistazo matutino — pedidos, entregas y alertas abiertas. El registro de Actividad muestra todo y se mantiene compacto para que tu menú siempre esté a la mano.',pts:['Mosaicos: pedidos, entregas, alertas','Registro de actividad (Expandir)','Barra: Resumen, Clientes, Entregas, Cocina, Staff, Finanzas, Comms']},
      '<div class="m-nav"><span class="on"><i>◎</i>Overview</span><span><i>🚚</i>Deliveries</span><span><i>👥</i>Staff</span><span><i>🤖</i>AI Ops</span></div>'),
    S({en:'Deliveries',es:'Entregas'},
      {h:'Assign a route',vo:'Build routes here — pick the stops and a driver, and assign. That sends the offer. You’ll see “awaiting driver,” then it clears when they accept. If nobody takes it, it shows “unfilled” and you reassign.',pts:['Pick stops + driver → Assign','Sends push + text offer','“awaiting driver” → clears on accept','“unfilled” = reassign']},
      {h:'Asignar una ruta',vo:'Crea rutas aquí — elige las paradas y un conductor, y asigna. Eso envía la oferta. Verás “esperando conductor”, y se libera al aceptar. Si nadie la toma, dice “sin asignar” y la reasignas.',pts:['Elige paradas + conductor → Asignar','Envía oferta por push + texto','“esperando conductor” → se libera al aceptar','“sin asignar” = reasignar']},
      '<div class="m-card"><div class="m-row"><span class="m-title">Luis (driver)</span><span class="m-badge win">awaiting driver</span></div><div class="m-sub">4 stops</div></div>'),
    S({en:'Customers',es:'Clientes'},

      {h:'PINs, reliability, vendors',vo:'Add staff here — they get a one-time PIN to set their own. You can see each driver’s reliability — accepted, denied, missed — and for vendors, set their lead time so Añejo Ops can time orders.',pts:['Add staff → one-time PIN','Driver reliability: accepted / denied / missed','Vendor “lead days” for order timing']},

/* ---- engine ---- */
var lang='en', role='everyone', idx=0;

/* ---- narrated auto-play (browser speech) ---- */
var playing=false, speakSeq=0;
function ttsOn(){ return 'speechSynthesis' in window; }
function pickVoice(l){
  try{ var vs=speechSynthesis.getVoices()||[]; var p=l==='es'?'es':'en';
    return vs.filter(function(v){return v.lang&&v.lang.toLowerCase().indexOf(p)===0;})
             .sort(function(a,b){return (b.localService?1:0)-(a.localService?1:0);})[0]||null;
  }catch(e){ return null; }
}
function paintPlay(){
  var b=document.getElementById('play'); if(!b) return;
  b.textContent = playing ? (lang==='es'?'⏸ Pausar narración':'⏸ Pause narration')
                          : (lang==='es'?'▶ Reproducir tour narrado':'▶ Play narrated tour');
}
function speakCurrent(){
  if(!playing) return;
  speakSeq++; var mySeq=speakSeq, advanced=false;
  var c=TOUR[role][idx][lang];
  function adv(){ if(advanced||!playing||mySeq!==speakSeq) return; advanced=true;
    if(idx<TOUR[role].length-1) go(1); else stopPlay(); }
  var est=Math.max(4500,(c.vo||'').length*60);
  var timer=setTimeout(adv, est+1600);                 // safety: advance even if speech never ends
  if(ttsOn()){
    try{ speechSynthesis.cancel(); }catch(e){}
    var u=new SpeechSynthesisUtterance(c.vo);
    u.lang = lang==='es'?'es-ES':'en-US'; var v=pickVoice(lang); if(v) u.voice=v; u.rate=0.98; u.pitch=1;
    u.onend=function(){ clearTimeout(timer); adv(); };
    u.onerror=function(){ /* timer fallback advances */ };
    setTimeout(function(){ if(playing&&mySeq===speakSeq){ try{ speechSynthesis.speak(u);}catch(e){} } }, 90);
  }
}
function startPlay(){ playing=true; render(); }
function stopPlay(){ playing=false; speakSeq++; try{ if(ttsOn()) speechSynthesis.cancel(); }catch(e){}
  var s=document.getElementById('scene'); if(s) s.classList.remove('playing'); paintPlay(); }
function togglePlay(){ playing?stopPlay():startPlay(); }
if(ttsOn()){ try{ speechSynthesis.getVoices(); speechSynthesis.onvoiceschanged=function(){}; }catch(e){} }
function setLang(l){ lang=l; document.getElementById('en').className=l==='en'?'on':''; document.getElementById('es').className=l==='es'?'on':''; render(); }
function setRole(r){ role=r; idx=0; render(); }
function go(d){ var n=TOUR[role].length; idx=Math.max(0,Math.min(n-1,idx+d)); render(); }
function renderRoles(){
  document.getElementById('roles').innerHTML = ROLES.map(function(r){
    return '<button class="'+(r.key===role?'on':'')+'" onclick="setRole(\''+r.key+'\')"><span class="ic">'+r.ic+'</span>'+r[lang]+'</button>';
  }).join('');
}
function render(){
  renderRoles();
  var scenes=TOUR[role], n=scenes.length, sc=scenes[idx], c=sc[lang];
  document.getElementById('prog').innerHTML = scenes.map(function(_,i){ return '<div class="dot '+(i<idx?'done':i===idx?'cur':'')+'"></div>'; }).join('');
  document.getElementById('scene').innerHTML =
    '<div class="kicker">'+sc.kicker[lang]+'</div><h2>'+c.h+'</h2>'+
    '<div class="mock">'+sc.mock+'</div>'+
    '<p class="vo">'+c.vo+'</p>'+
    '<ul class="points">'+c.pts.map(function(p){return '<li>'+p+'</li>';}).join('')+'</ul>';
  document.getElementById('back').disabled = idx===0;
  var nextBtn=document.getElementById('next');
  nextBtn.querySelector('[data-t="next"]').textContent = idx===n-1 ? T.finish[lang] : T.next[lang];
  document.querySelector('[data-t="back"]').textContent = T.back[lang];
  document.getElementById('scount').textContent = T.scene[lang]+' '+(idx+1)+' '+T.of[lang]+' '+n;
  document.getElementById('scene').classList.toggle('playing', playing);
  paintPlay();
  if(playing) speakCurrent();   // narrated mode: speak this scene, then auto-advance on end
}
render();
</script>
