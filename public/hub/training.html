<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Añejo HUB — Training</title>
<meta name="robots" content="noindex">
<style>
  :root{
    --green:#1A3D2E; --green-700:#15311f; --gold:#C6A85B; --gold-700:#8a7a2e;
    --cream:#F5F2EC; --paper:#fffdf8; --ink:#21302a; --muted:#6f7b74; --line:#e3ddcf;
    --crit:#b3402f;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased}
  .wrap{max-width:780px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
  .bar{background:var(--green);color:var(--cream);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5}
  .bar h1{font-size:15px;letter-spacing:2px;margin:0;font-weight:700}.bar h1 b{color:var(--gold)}
  .bar .right{display:flex;align-items:center;gap:10px}
  .lang{display:flex;border:1px solid rgba(245,242,236,.4);border-radius:20px;overflow:hidden;font-size:12px;font-weight:700}
  .lang button{background:transparent;color:var(--cream);border:0;padding:5px 11px;cursor:pointer}
  .lang button.on{background:var(--gold);color:var(--green)}
  .home{color:var(--cream);text-decoration:none;font-size:13px;opacity:.85}
  /* landing */
  .land{padding:26px 18px}
  .land h2{font-size:24px;color:var(--green);margin:0 0 6px}
  .land p{color:var(--muted);margin:0 0 20px;font-size:15px;line-height:1.5}
  .pick{display:grid;gap:12px}
  .pick a{display:flex;align-items:center;gap:14px;background:var(--paper);border:1px solid var(--line);border-left:4px solid var(--gold);
    border-radius:14px;padding:16px 18px;text-decoration:none;color:var(--ink);box-shadow:0 5px 18px rgba(26,61,46,.05)}
  .pick a .ic{font-size:26px}
  .pick a .tt{display:block;font-weight:700;color:var(--green);font-size:17px}
  .pick a .ds{display:block;font-size:13px;color:var(--muted);margin-top:3px;line-height:1.4}
  .pick a.full{border-left-color:var(--green);background:#fff8e9}
  /* module */
  .stage{flex:1;padding:16px 16px 30px}
  .modhead{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .modhead .badge{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--green);background:#e7e0cf;border-radius:20px;padding:4px 11px}
  .prog{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
  .dot{height:5px;border-radius:3px;background:var(--line);flex:1 1 8px;min-width:8px}
  .dot.done{background:var(--gold)}.dot.cur{background:var(--green)}
  .scene{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 6px 22px rgba(26,61,46,.06);animation:fade .3s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .scene.playing{box-shadow:0 0 0 2px var(--gold),0 10px 30px rgba(26,61,46,.12)}
  .kicker{font-size:11px;font-weight:800;letter-spacing:1.4px;color:var(--gold-700);text-transform:uppercase}
  .scene h3{margin:4px 0 12px;font-size:20px;color:var(--green);line-height:1.2}
  .mock{background:var(--cream);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:14px}
  .blk{border-left:3px solid var(--line);padding:8px 0 8px 12px;margin:10px 0;font-size:14px;line-height:1.5}
  .blk .lab{display:block;font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;margin-bottom:2px}
  .blk.trig{border-color:var(--gold)} .blk.trig .lab{color:var(--gold-700)}
  .blk.you{border-color:var(--green)} .blk.you .lab{color:var(--green)}
  .blk.then{border-color:#9a8} .blk.then .lab{color:#5c7}
  .blk.then .lab{color:var(--gold-700)}
  .note{font-size:12.5px;color:var(--muted);background:#fff;border:1px dashed var(--line);border-radius:8px;padding:8px 10px;margin-top:8px}
  .nav{display:flex;gap:10px;margin-top:16px}
  .btn{flex:1;border:0;border-radius:12px;padding:13px;font-size:15px;font-weight:700;cursor:pointer}
  .btn.gold{background:var(--gold);color:var(--green)} .btn.ghost{background:#fff;border:1.5px solid var(--line);color:var(--ink)}
  .btn.play{background:var(--green);color:#fff;width:100%;margin-top:10px}
  .btn:disabled{opacity:.4;cursor:default}
  .scount{text-align:center;font-size:12px;color:var(--muted);margin-top:10px}
  .m-nav{display:flex;background:var(--green-700);border-radius:9px;overflow:hidden}
  .m-nav span{flex:1;text-align:center;color:rgba(245,242,236,.7);font-size:10px;padding:7px 2px}
  .m-nav span.on{color:var(--gold)}.m-nav span i{display:block;font-size:15px;font-style:normal}
  .m-card{background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px;margin:5px 0}
  .m-t{font-weight:700;color:var(--green);font-size:13px}.m-s{font-size:12px;color:var(--muted)}
  .m-b{display:inline-block;font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px;background:#eee;color:#555}
  .m-b.sub{background:var(--gold);color:var(--green)}.m-b.ok{background:#dcebe0;color:var(--green)}
  .m-b.win{background:#efe7cf;color:var(--gold-700)}.m-b.crit{background:#f3d9d3;color:var(--crit)}
  .m-btn{display:block;text-align:center;background:var(--green);color:#fff;font-weight:700;border-radius:8px;padding:8px;font-size:12px;margin-top:7px}
  .m-u{display:inline-flex;gap:4px;margin-top:5px}.m-u b{width:24px;height:24px;border:1.5px solid var(--line);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;background:#fff}.m-u b.on{background:var(--green);color:#fff;border-color:var(--green)}
</style>
</head>
<body>
<div class="wrap">
  <div class="bar">
    <h1>AÑEJO <b>·</b> TRAINING</h1>
    <div class="right">
      <a class="home" id="cardlink" href="#" style="display:none">🖨 <span data-t="card">Card</span></a>
      <a class="home" id="homelink" href="/hub/training" style="display:none">↩︎ <span data-t="all">All</span></a>
      <div class="lang"><button id="en" class="on" onclick="setLang('en')">EN</button><button id="es" onclick="setLang('es')">ES</button></div>
    </div>
  </div>

  <div class="land" id="land">
    <h2 data-t="choose">Choose your training</h2>
    <p data-t="chooseSub">Pick your role. Each tutorial covers exactly what you need — your screen, what's expected of you, and what kicks off your work. The Owner walkthrough covers the whole system end to end.</p>
    <div class="pick" id="pick"></div>
  </div>

  <div class="stage" id="stage" style="display:none">
    <div class="modhead"><span class="badge" id="mod-badge"></span></div>
    <div class="prog" id="prog"></div>
    <div class="scene" id="scene"></div>
    <div class="nav">
      <button class="btn ghost" id="back" onclick="go(-1)">← <span data-t="back">Back</span></button>
      <button class="btn gold" id="next" onclick="go(1)"><span data-t="next">Next</span> →</button>
    </div>
    <button class="btn play" id="play" onclick="togglePlay()">▶ <span data-t="play">Play narrated tour</span></button>
    <div class="scount" id="scount"></div>
  </div>
</div>

<script>
/* ============ content ============
   Each step: k kicker, t title, m mock(optional), x TRIGGER, y YOU DO, z THEN(downstream), n note(optional).
   Staff roles add _es variants (t2,x2,y2,z2). Owner module is English (management). */
var UI = {
  all:{en:'All',es:'Todo'}, card:{en:'Card',es:'Tarjeta'}, back:{en:'Back',es:'Atrás'}, next:{en:'Next',es:'Siguiente'}, finish:{en:'Finish',es:'Terminar'},
  play:{en:'Play narrated tour',es:'Reproducir tour narrado'}, pause:{en:'Pause narration',es:'Pausar narración'},
  step:{en:'Step',es:'Paso'}, of:{en:'of',es:'de'}, choose:{en:'Choose your training',es:'Elige tu capacitación'},
  chooseSub:{en:"Pick your role. Each tutorial covers exactly what you need — your screen, what's expected of you, and what kicks off your work. The Owner walkthrough covers the whole system end to end.",
             es:'Elige tu rol. Cada tutorial cubre justo lo que necesitas — tu pantalla, lo que se espera de ti, y qué inicia tu trabajo. El recorrido del Dueño cubre todo el sistema de principio a fin.'},
  trig:{en:'Trigger',es:'Qué lo inicia'}, you:{en:'You do',es:'Tú haces'}, then:{en:'Then (automatic)',es:'Luego (automático)'}
};
var ROLES = [
  { key:'owner',   ic:'◎',  full:true, en:'Owner — full end-to-end', es:'Dueño — todo de principio a fin', den:'The entire system: order & subscription flow, dispatch, staff, finance, the AI Ops agent, automations, alerts.', des:'Todo el sistema: pedidos y suscripciones, despacho, personal, finanzas, el agente AI Ops, automatizaciones, alertas.' },
  { key:'kitchen', ic:'🍳', en:'Kitchen', es:'Cocina', den:'Your board, per-bowl prep with PIN, inventory, checklists, Creative Studio, EOD.', des:'Tu tablero, preparación por bowl con PIN, inventario, listas, Creative Studio, EOD.' },
  { key:'driver',  ic:'🚚', en:'Driver', es:'Conductor', den:'Accept a run, confirm pickup, deliver with proof, report problems, expenses, EOD.', des:'Aceptar una ruta, confirmar recogida, entregar con prueba, reportar problemas, gastos, EOD.' },
  { key:'vendor',  ic:'📦', en:'Vendor', es:'Proveedor', den:'Receive purchase orders, acknowledge, and confirm what you delivered.', des:'Recibir órdenes de compra, confirmar y marcar lo entregado.' }
];

function S(o){ return o; }
var MOD = {
  owner: [
    S({k:'Welcome',t:'The HUB is your whole back office',m:'<div class="m-nav"><span class="on"><i>◎</i>Overview</span><span><i>🧑‍🤝‍🧑</i>Customers</span><span><i>🚚</i>Deliveries</span><span><i>👥</i>Staff</span><span><i>💵</i>Finance</span></div>',
      x:'You sign in at anejocateringco.com/login with your owner PIN.',
      y:'Use the bottom bar to move between Overview, Customers, Deliveries, Kitchen, Staff, Finance and Comms — plus AI Ops, Content and Schedule.',

    S({k:'The big picture',t:'How one order flows, end to end',
      x:'A customer checks out on the public site (Square handles payment) — or you take a manual order.',

      z:'Square’s webhook marks the order paid → it appears on the Kitchen board → kitchen preps & marks ready → you assign a driver → driver confirms pickup, delivers with a photo → the customer is texted at each step → the order is fulfilled.'}),
    S({k:'Overview',t:'Command Center — your morning glance',m:'<div class="m-card"><div class="m-t">Today</div><div class="m-s">12 orders · 3 routes · 2 open alerts</div></div>',
      x:'Opens the moment you land on /hub/owner.',
      y:'Scan the tiles (orders, deliveries, alerts) and the Activity feed; tap Expand for the full log.',
      z:'Open alerts here are raised automatically by the system (see the Alerts step). The feed is your audit trail of everything happening.'}),
    S({k:'Orders',t:'The order lifecycle',m:'<div class="m-card"><span class="m-b">pending</span> → <span class="m-b">paid</span> → <span class="m-b win">prep</span> → <span class="m-b ok">ready</span> → fulfilled</div>',
      x:'Orders arrive paid from Square, or you add a manual order from the Kitchen/Orders view.',
      y:'You rarely touch an order directly — the kitchen and driver move it. You can cancel or adjust a manual one.',
      z:'Status changes ripple: paid → kitchen sees it; ready → available to route; delivered → fulfilled + customer texted.'}),
    S({k:'Customers',t:'Your CRM',m:'<div class="m-card"><div class="m-t">Maria G. <span class="m-b ok">subscribed</span></div><div class="m-s">orders · subscription · daily schedule</div></div>',
      x:'Every checkout (guest or member) creates/updates a customer record automatically.',
      y:'Open anyone to see orders, subscription and their upcoming daily bowls. Onboard a guest into a managed member when you want to attach a plan.',

      x:'A client subscribes on the public site (Square). The client picks lunch, dinner, or both.',
      y:'Nothing to do — you just see ONE subscription on the customer’s card.',
      z:'A nightly job materializes the next 7 days of DAILY kitchen orders (one rotating bowl per chosen window, Mon–Sat, starting next Monday), each tagged “Subscription” on the kitchen board.'}),
    S({k:'Deliveries',t:'Build & assign a route',m:'<div class="m-card"><div class="m-t">Route · 4 stops</div><div class="m-s">pick driver → Assign</div></div>',
      x:'You open Deliveries; ready/paid orders for the date show as unassigned.',
      y:'Select the stops, pick a driver, and Assign. (AI Ops can also propose an optimized route for you to accept.)',
      z:'Assigning sends the driver an OFFER — see the next step.'}),
    S({k:'Dispatch',t:'The driver offer & auto-roll',m:'<div class="m-card"><div class="m-t">Luis</div><div class="m-s"><span class="m-b win">awaiting driver</span></div></div>',
      x:'You assigned a route to a driver.',
      y:'Watch the badge. If it shows “unfilled — reassign”, pick another driver.',
      z:'The driver gets a push + text and Accept/Deny buttons. Deny — or 2 minutes of silence — auto-offers the next available driver. If none accept, the route goes “unfilled” and you get a high-priority alert. Every accept/deny/miss is logged on the driver’s card.'}),
    S({k:'On-demand',t:'ASAP / live orders',m:'<div class="m-card"><div class="m-t">Walk-up order <span class="m-b crit">🛵 ASAP</span></div><div class="m-s">assign to an available driver now</div></div>',

    S({k:'Staff oversight',t:'Reliability, lead times, compliance',m:'<div class="m-card"><div class="m-t">Luis</div><div class="m-s">📦 18 accepted · 1 denied · 0 missed</div></div>',

      y:'In Staff, read each driver’s reliability (accepted / denied / missed) and set each vendor’s lead-time in days.',

    S({k:'Security',t:'PINs & the audit trail',
      x:'Kitchen staff check off bowls and mark orders ready; drivers confirm pickups.',
      y:'Nothing — but know that each of those requires the staffer’s PIN.',
      z:'Every PIN-gated action is recorded (who + when) in the kitchen audit log, so a wrong bowl traces back to a person.'}),
    S({k:'Comms',t:'Messaging & broadcasts',m:'<div class="m-card"><div class="m-t">Threads</div><div class="m-s">driver · kitchen · client · broadcast</div></div>',
      x:'You need to tell a driver, the kitchen, or a client something.',
      y:'Open Comms, post to a thread or broadcast. Close/archive a thread when it’s done.',
      z:'Route assignments and customer notices also drop into Comms automatically, so there’s one history per person.'}),
    S({k:'Finance',t:'Sales, tips & payouts',m:'<div class="m-card"><div class="m-t">$1,840 sales today</div><div class="m-s">$72 driver tips · trainer rev-share $46</div></div>',
      x:'Orders get paid and delivered; drivers earn tips; trainers earn rev-share.',
      y:'Open Finance to see sales, captured tips, and trainer rev-share owed.',
      z:'Square’s webhook records each payment + tip on the order; trainer rev-share is ledgered on each paid subscription invoice — all automatic.'}),
    S({k:'Schedule',t:'Driver shifts',
      x:'You plan who drives when.',
      y:'In Schedule, assign driver shifts for upcoming days.',
      z:'Late clock-ins against a scheduled shift raise a late-clock-in alert.'}),
    S({k:'Content',t:'Brand brief & docs — what trains the AI',m:'<div class="m-card"><div class="m-t">Brand & Standards Brief</div><div class="m-s">menu · house style · allergens · plating</div></div>',
      x:'You want the AI sous-chef (Creative Studio) and the brand to stay consistent.',
      y:'In Content, keep the Brand & Standards brief and the docs library current.',
      z:'Creative Studio reads the brand brief on every AI turn, so updates here change how the AI develops recipes — no developer needed.'}),
    S({k:'Añejo Ops ①',t:'Demand forecast → prep sheet',m:'<div class="m-card"><div class="m-t">📊 Tomorrow · 28 bowls</div><div class="m-s">75% confidence · 16 sub + 12 on-demand</div></div>',
      x:'A nightly job (~10pm) runs automatically; you can also tap “Run forecast now.”',
      y:'Read the forecast + the per-bowl prep sheet in AI Ops.',
      z:'The forecast = known subscriptions + a same-weekday average of on-demand history; it gets sharper as data accumulates, and the prep sheet drives the kitchen’s morning briefing.'}),
    S({k:'Añejo Ops ②',t:'Vendor orders — you approve every one',m:'<div class="m-card"><div class="m-t">Vendor order ~$84</div><div class="m-s"><span class="m-b">below par</span> · lands ~Thu</div><div class="m-btn">Accept / Dismiss</div></div>',
      x:'Inventory drops below par and the forecast says you’ll need more.',
      y:'In AI Ops → Suggestions, review the proposed order (quantities, cost, order-by/lands-by) and Accept or Dismiss.',
      z:'Accepting drafts a purchase order the kitchen submits to the vendor. The agent NEVER places an order or spends money on its own — approval is always yours.'}),
    S({k:'Añejo Ops ③',t:'Briefings, checklists & reports',m:'<div class="m-card"><div class="m-t">🗞️ Daily standup</div><div class="m-s">22 orders · 31 bowls · $1,840 · top: FUEGO</div></div>',

    S({k:'The brain',t:'Automations & the cron schedule',m:'<div class="m-card"><div class="m-t">⏱ Runs every minute</div><div class="m-s">nightly forecast · morning prep · weekly backup · 2-min offer timeouts</div></div>',

    S({k:'Alerts',t:'What the system flags for you',m:'<div class="m-card"><div class="m-t" style="color:var(--crit)">⚠ Route unfilled — reassign</div><div class="m-s">temp excursion · expense pending · low stock · missed EOD</div></div>',

    S({k:'Data safety',t:'Backups',m:'<div class="m-card"><div class="m-t">💾 Weekly backup</div><div class="m-s">full database → cloud · 30-day retention · “Backup now”</div></div>',

    S({k:'Leads',t:'Marketing leads',

      z:'SMS/email to leads is consent-gated — the system only contacts people who opted in.'}),
    S({k:'Your rhythm',t:'A day in the HUB',

  ],
  kitchen: [
    S({k:'Start',t:'Clock in → your morning briefing',m:'<div class="m-card" style="background:#fff8e9;border-color:var(--gold)"><div class="m-t">☀️ Good morning</div><div class="m-s">28 bowls today (16 lunch / 12 dinner) · ⚠ 2 low</div></div>',

      t2:'Marca entrada → tu resumen', x2:'Llegas y tocas la tarjeta verde de entrada.', y2:'Marca entrada y lee el aviso ☀️ del resumen.', z2:'La PRIMERA entrada de cocina del día activa el resumen de Añejo Ops — total de bowls, reparto almuerzo/cena, y lo que está bajo de inventario.'}),
    S({k:'Your screen',t:'The order board',m:'<div class="m-card"><div class="m-t">Maria G. · 1 item <span class="m-b sub">Subscription</span></div><div class="m-s"><span class="m-b ok">today</span> <span class="m-b win">lunch</span></div></div>',
      x:'Orders appear by themselves and chime.',
      y:'Work them left to right: Pending → Prep → Ready.',
      z:'A gold “Subscription” tag is a member’s daily bowl; the badges show day + lunch/dinner.',

    S({k:'What starts your work',t:'Where orders come from',
      x:'A customer pays on the website (Square), OR the nightly job creates a subscriber’s daily bowl, OR the owner adds a manual order.',

      z:'You are the next step after payment: the board is your queue.',

/* ============ engine ============ */
var lang='en', role=null, idx=0;
function qRole(){ try{ var m=/[?&]role=([a-z]+)/.exec(location.search); return m && MOD[m[1]] ? m[1] : null; }catch(e){ return null; } }
function L(o,f){ return (lang==='es' && o[f+'2']) ? o[f+'2'] : o[f]; }
function voOf(o){ return L(o,'t')+'. '+UI.trig[lang]+': '+L(o,'x')+' '+UI.you[lang]+': '+L(o,'y')+' '+UI.then[lang]+': '+L(o,'z'); }

/* narrated autoplay */
var playing=false, seq=0;
function tts(){ return 'speechSynthesis' in window; }
function pickVoice(l){ try{ var v=speechSynthesis.getVoices()||[]; var p=l==='es'?'es':'en'; return v.filter(function(x){return x.lang&&x.lang.toLowerCase().indexOf(p)===0;}).sort(function(a,b){return (b.localService?1:0)-(a.localService?1:0);})[0]||null; }catch(e){ return null; } }
function paintPlay(){ var b=document.getElementById('play'); if(b) b.innerHTML=(playing?'⏸ ':'▶ ')+'<span>'+(playing?UI.pause[lang]:UI.play[lang])+'</span>'; }
function speakCur(){
  if(!playing||!role) return; seq++; var my=seq, adv=false;
  var sc=MOD[role][idx];
  function go2(){ if(adv||!playing||my!==seq) return; adv=true; if(idx<MOD[role].length-1) go(1); else stopPlay(); }
  var txt=voOf(sc); var t=setTimeout(go2, Math.max(5000,txt.length*55)+1600);
  if(tts()){ try{ speechSynthesis.cancel(); }catch(e){}
    var u=new SpeechSynthesisUtterance(txt); u.lang=lang==='es'?'es-ES':'en-US'; var v=pickVoice(lang); if(v)u.voice=v; u.rate=0.98;
    u.onend=function(){ clearTimeout(t); go2(); };
    setTimeout(function(){ if(playing&&my===seq){ try{ speechSynthesis.speak(u);}catch(e){} } },90);
  }
}
function startPlay(){ playing=true; render(); }
function stopPlay(){ playing=false; seq++; try{ if(tts()) speechSynthesis.cancel(); }catch(e){} var s=document.getElementById('scene'); if(s)s.classList.remove('playing'); paintPlay(); }
function togglePlay(){ playing?stopPlay():startPlay(); }
if(tts()){ try{ speechSynthesis.getVoices(); speechSynthesis.onvoiceschanged=function(){}; }catch(e){} }

function setLang(l){ lang=l; document.getElementById('en').className=l==='en'?'on':''; document.getElementById('es').className=l==='es'?'on':''; document.querySelectorAll('[data-t]').forEach(function(el){ var k=el.getAttribute('data-t'); if(UI[k]) el.textContent=UI[k][l]; }); if(role) render(); else renderLand(); }
function go(d){ if(!role) return; var n=MOD[role].length; idx=Math.max(0,Math.min(n-1,idx+d)); render(); }

function renderLand(){
  document.getElementById('pick').innerHTML = ROLES.map(function(r){
    return '<a class="'+(r.full?'full':'')+'" href="?role='+r.key+'"><span class="ic">'+r.ic+'</span><span><span class="tt">'+r[lang]+'</span><span class="ds">'+r['d'+lang]+'</span></span></a>';
  }).join('');
}
function render(){
  var scenes=MOD[role], n=scenes.length, sc=scenes[idx];
  document.getElementById('mod-badge').textContent = (ROLES.filter(function(r){return r.key===role;})[0]||{})[lang] || role;
  document.getElementById('prog').innerHTML = scenes.map(function(_,i){ return '<div class="dot '+(i<idx?'done':i===idx?'cur':'')+'"></div>'; }).join('');
  document.getElementById('scene').innerHTML =
    '<div class="kicker">'+sc.k+'</div><h3>'+L(sc,'t')+'</h3>'+
    (sc.m?'<div class="mock">'+sc.m+'</div>':'')+
    '<div class="blk trig"><span class="lab">⚡ '+UI.trig[lang]+'</span>'+L(sc,'x')+'</div>'+
    '<div class="blk you"><span class="lab">✋ '+UI.you[lang]+'</span>'+L(sc,'y')+'</div>'+
    '<div class="blk then"><span class="lab">➡ '+UI.then[lang]+'</span>'+L(sc,'z')+'</div>'+
    (sc.n?'<div class="note">'+L(sc,'n')+'</div>':'');
  document.getElementById('back').disabled = idx===0;
  document.getElementById('next').querySelector('[data-t="next"]').textContent = idx===n-1 ? UI.finish[lang] : UI.next[lang];
  document.getElementById('scount').textContent = UI.step[lang]+' '+(idx+1)+' '+UI.of[lang]+' '+n;
  document.getElementById('scene').classList.toggle('playing', playing);
  paintPlay();
  if(playing) speakCur();
}
function boot(){
  role = qRole();
  if(role){ document.getElementById('land').style.display='none'; document.getElementById('stage').style.display='block'; document.getElementById('homelink').style.display='inline';
    var cl=document.getElementById('cardlink'); cl.href='/hub/training-card?role='+role; cl.style.display='inline'; render(); }
  else { document.getElementById('land').style.display='block'; document.getElementById('stage').style.display='none'; renderLand(); }
}
boot();
