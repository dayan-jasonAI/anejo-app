<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Route · Añejo Driver</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#1b3a2b">
<link rel="manifest" href="/hub/manifest.webmanifest">
<link rel="icon" type="image/png" href="/assets/img/favicon.png">
<link rel="apple-touch-icon" href="/assets/img/emblem.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="/hub/assets/hub.css">
<style>
  .stop-eta{font-size:11px;font-weight:700;color:var(--gold-700,#8a7a2e);white-space:nowrap;margin-left:6px}
  .stop-addr{font-size:13px;color:var(--green);margin:3px 0}
  .stop-note{font-size:12px;color:#8a6d3b;background:#fbf3da;border-radius:6px;padding:4px 8px;margin-top:4px}
  .cur-card{border:2px solid var(--gold,#C6A85B);background:linear-gradient(180deg,#fffdf6,#fff8e9);box-shadow:0 6px 22px rgba(198,168,91,.22)}
  .cur-name{font-size:21px;font-weight:800;color:var(--green);display:flex;align-items:center;flex-wrap:wrap;gap:6px}
  .cur-actions{display:flex;flex-direction:column;gap:8px;margin-top:14px}
  /* friendly status pills for the upcoming-stops list */
  .stop-pill{font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
  .stop-pill.cur{background:var(--gold);color:#3a2f12}
  .stop-pill.loaded{background:var(--green-200);color:var(--green)}
  .stop-pill.way{background:#e6eff7;color:var(--info)}
  .stop-pill.near{background:#fbf3da;color:var(--gold-dark)}
  .stop-pill.is-done{background:var(--green-200);color:var(--ok)}
  .stop-pill.is-failed{background:#fbe3e1;color:var(--crit)}
  .stop-pill.wait{background:var(--cream-dark);color:var(--muted)}
  /* delivery action sheet — dim backdrop + gentle slide-up */
  #sheet-backdrop{display:none;position:fixed;inset:0;background:rgba(13,13,13,.45);z-index:49}
  #sheet{box-shadow:0 -10px 44px rgba(13,13,13,.28);border-radius:16px 16px 14px 14px}
  #sheet.show{animation:sheetUp .22s ease}
  @keyframes sheetUp{from{transform:translateY(18px);opacity:.3}to{transform:translateY(0);opacity:1}}
  .sheet-grab{width:42px;height:4px;border-radius:3px;background:var(--line);margin:2px auto 12px}
  .bowl-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line,#e5e0d3)}
  .bowl-name{font-weight:600;color:var(--green)}
  .units{display:flex;gap:6px;flex-wrap:wrap}
  .unit{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--line,#cfc9b8);background:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .unit.on{background:var(--green,#1A3D2E);color:#fff;border-color:var(--green)}
  .pick-done{font-size:12px;font-weight:700;color:var(--green)}
  .small{font-size:12px;color:#6b6b6b}
  .pay-line{margin-top:6px;font-size:14px;font-weight:700;color:var(--green);background:#eef5ef;border:1px solid #cfe2d4;border-radius:8px;padding:7px 10px;display:inline-block}
</style>
</head>
<body>
<div class="hub-bar"><h1>AÑEJO · ROUTE</h1><div class="hub-bar-actions"><button id="lang-toggle" type="button">ES</button></div></div>

<div class="hub-wrap">
  <div class="hub-section">
    <div id="route-head" class="card"><p class="row-sub" data-i18n>Loading route…</p></div>
  </div>

  <!-- Pickup gate: check off every bowl before deliveries begin -->
  <div class="hub-section" id="pickup-section" hidden>
    <h2 class="row-title" data-i18n>Kitchen pickup</h2>
    <p class="small" data-i18n>Tap each bowl as you load it. This confirms every bowl left the kitchen.</p>
    <div id="pickup-list" class="list" style="margin-top:8px"></div>
    <button class="btn block gold" id="start-deliveries" type="button" style="margin-top:12px;display:none" data-i18n>Start deliveries →</button>
  </div>

  <!-- Delivery mode -->
  <div class="hub-section" id="deliver-section" hidden>
    <div id="current-stop"></div>
    <h2 class="row-title" style="margin-top:14px" data-i18n>Upcoming stops</h2>
    <div id="stops" class="list"></div>
  </div>
</div>

<!-- Delivery action sheet -->
<div id="sheet-backdrop"></div>
<div id="sheet" class="card accent" style="display:none;position:fixed;left:12px;right:12px;bottom:16px;max-width:560px;margin:0 auto;z-index:50;">
  <div class="sheet-grab"></div>
  <h2 class="row-title" id="sheet-title">Stop</h2>
  <div id="sheet-mode-deliver">
    <div class="field">
      <label data-i18n>Proof photo (take at the door)</label>
      <input type="file" accept="image/*" capture="environment" id="proof-photo">
    </div>
    <label class="small" style="display:flex;gap:7px;align-items:center;margin:4px 0 8px">
      <input type="checkbox" id="skip-photo"> <span data-i18n>Couldn't take a photo (left at door / contactless)</span>
    </label>
    <button class="btn block gold" id="deliver-btn" type="button" data-i18n>Mark delivered</button>
  </div>
  <div id="sheet-mode-fail" style="display:none">
    <div class="field">
      <label data-i18n>Reason</label>
      <select id="fail-reason">
        <option value="no_answer" data-i18n>No answer</option>
        <option value="wrong_address" data-i18n>Wrong address</option>
        <option value="refused" data-i18n>Refused</option>
        <option value="damaged" data-i18n>Damaged</option>
        <option value="other" data-i18n>Other</option>
      </select>
    </div>
    <div class="field"><label data-i18n>Note (optional)</label><textarea id="fail-note"></textarea></div>
    <button class="btn block" id="fail-btn" type="button" style="background:var(--crit)" data-i18n>Mark failed</button>
  </div>
  <div class="card-grid" style="margin-top:10px">
    <button class="btn ghost" id="toggle-mode" type="button" data-i18n>Switch to failed</button>
    <button class="btn ghost" id="sheet-close" type="button" data-i18n>Close</button>
  </div>
</div>

<!-- Driver PIN prompt (pickup confirmation). -->
<div id="pin-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:60;align-items:center;justify-content:center">
  <div class="card" style="max-width:300px;margin:16px;text-align:center">
    <div class="row-title" id="pin-title" data-i18n>Enter your PIN</div>
    <input id="pin-input" type="password" inputmode="numeric" autocomplete="off" maxlength="8"
      style="width:100%;padding:11px;border:1px solid var(--line,#ccc);border-radius:8px;font-size:24px;letter-spacing:.3em;text-align:center;margin:12px 0">
    <div id="pin-err" class="small" style="color:var(--crit,#b00);min-height:16px"></div>
    <div class="card-grid" style="display:flex;gap:8px;margin-top:8px">
      <button class="btn gold" id="pin-ok" type="button" style="flex:1" data-i18n>Confirm</button>
      <button class="btn ghost" id="pin-cancel" type="button" style="flex:1" data-i18n>Cancel</button>
    </div>
  </div>
</div>

<script src="/assets/js/i18n.js"></script>
<script src="/hub/assets/hub.js"></script>
<script src="/hub/driver/assets/driver.js"></script>
<script>
(function () {
  Hub.boot();
  if (window.Driver && Driver.nav) Driver.nav('route');

  var routeData = null, pickupData = null, current = null, mode = 'deliver';
  var gpsTimer = null;
  var head = document.getElementById('route-head');
  var pickSection = document.getElementById('pickup-section');
  var delivSection = document.getElementById('deliver-section');
  var sheet = document.getElementById('sheet');
  var refresh = function () { if (window.AnejoI18n) window.AnejoI18n.refresh(); };

  // ---- PIN prompt (pickup confirmation) ----
  // askPin(title, submit): submit(pin, helpers); helpers.fail(msg) keeps the modal open with an
  // error (wrong PIN → retry), helpers.done() closes it.
  var _pinSubmit = null;
  function askPin(title, submit) {
    _pinSubmit = submit;
    document.getElementById('pin-title').textContent = title || 'Enter your PIN';
    var inp = document.getElementById('pin-input'); inp.value = '';
    document.getElementById('pin-err').textContent = '';
    document.getElementById('pin-modal').style.display = 'flex';
    setTimeout(function () { inp.focus(); }, 30);
  }
  function closePin() { document.getElementById('pin-modal').style.display = 'none'; _pinSubmit = null; }
  (function wirePin() {
    var ok = document.getElementById('pin-ok'), inp = document.getElementById('pin-input'), err = document.getElementById('pin-err');
    function go() {
      var pin = (inp.value || '').trim();
      if (!/^\d{4,8}$/.test(pin)) { err.textContent = 'Enter your 4–8 digit PIN.'; return; }
      var fn = _pinSubmit; if (!fn) return;
      ok.disabled = true;
      fn(pin, {
        fail: function (m) { ok.disabled = false; err.textContent = m || 'PIN not recognized.'; inp.value = ''; inp.focus(); },
        done: function () { ok.disabled = false; closePin(); }
      });
    }
    ok.addEventListener('click', go);
    inp.addEventListener('keydown', function (e) { if (e.key === 'Enter') go(); });
    document.getElementById('pin-cancel').addEventListener('click', closePin);
    document.getElementById('pin-modal').addEventListener('click', function (e) { if (e.target.id === 'pin-modal') closePin(); });
  })();

  function loadAll() {
    return Promise.all([
      Hub.api('/api/hub/driver/route'),
      Hub.api('/api/hub/driver/pickup').catch(function () { return { all_picked: true, stops: [] }; })
    ]).then(function (res) { routeData = res[0]; pickupData = res[1]; render(); });
  }

  // Pay / miles / finish-time summary for a route (what the driver earns + scope of the job).
  function routePayLine(r) {
    if (!r) return '';
    var clk = function (ms) { try { return new Date(Number(ms)).toLocaleTimeString('en-US', { timeZone: 'America/New_York', hour: 'numeric', minute: '2-digit' }); } catch (e) { return ''; } };
    var bits = [];
    if (r.pay_cents != null) bits.push('💵 $' + (Number(r.pay_cents) / 100).toFixed(2));
    if (r.stop_count != null) bits.push((r.stop_count) + ' stops');
    if (r.total_miles_est != null) bits.push(r.total_miles_est + ' mi');
    if (r.eta_complete_at) bits.push('done ~' + clk(r.eta_complete_at));
    else if (r.total_minutes != null) bits.push('~' + r.total_minutes + ' min');
    return bits.length ? '<div class="pay-line">' + bits.join(' &middot; ') + '</div>' : '';
  }

  function render() {
    // Network drop while loading — show a retry instead of a misleading "no route".
    if (routeData && routeData._networkError) {
      head.innerHTML = '<p class="row-sub" data-i18n>Couldn’t load your route — check your connection.</p>' +
        '<button class="btn ghost block" id="retry-load" type="button" style="margin-top:8px" data-i18n>Retry</button>';
      pickSection.hidden = true; delivSection.hidden = true; stopGps();
      var rb = document.getElementById('retry-load'); if (rb) rb.addEventListener('click', loadAll);
      refresh(); return;
    }
    if (!routeData || !routeData.route) {
      head.innerHTML = '<p class="row-sub" data-i18n>No route assigned for today.</p>';
      pickSection.hidden = true; delivSection.hidden = true; stopGps(); refresh(); return;
    }
    var r = routeData.route;

    // Offer gate: a newly-assigned route must be ACCEPTED before pickup/delivery begins.
    // Deny (or 2 min of silence) auto-offers it to the next available driver.
    if (r.offer_status === 'pending') {
      head.innerHTML = '<div class="card cur-card"><div class="cur-name" data-i18n>New delivery order</div>' +
        '<div class="stop-addr">' + (r.stop_count || 0) + ' <span data-i18n>stop(s) on</span> ' + Hub.esc(r.route_date || '') + '</div>' +
        routePayLine(r) +
        '<p class="small" data-i18n>Accept to start, or deny to pass it to another driver.</p>' +
        '<div class="cur-actions">' +
        '<button class="btn gold" id="offer-accept" type="button" data-i18n>✅ Accept order</button>' +
        '<button class="btn ghost" id="offer-decline" type="button" data-i18n>Deny</button>' +
        '</div></div>';
      pickSection.hidden = true; delivSection.hidden = true; stopGps();
      document.getElementById('offer-accept').addEventListener('click', function () {
        var b = this; b.disabled = true;
        Hub.api('/api/hub/driver/route', { method: 'POST', body: { action: 'accept' } }).then(function (resp) {
          if (resp && resp.ok) { Hub.toast('Order accepted'); loadAll(); } else { b.disabled = false; Hub.toast((resp && resp.error) || 'Error'); }
        });
      });
      document.getElementById('offer-decline').addEventListener('click', function () {
        if (!window.confirm('Deny this delivery order? It will be offered to another driver.')) return;
        var b = this; b.disabled = true;
        Hub.api('/api/hub/driver/route', { method: 'POST', body: { action: 'decline' } }).then(function (resp) {
          if (resp && resp.ok) { Hub.toast('Order denied — passing to another driver'); loadAll(); } else { b.disabled = false; Hub.toast((resp && resp.error) || 'Error'); }
        });
      });
      refresh();
      return;
    }

    var stops = routeData.stops || [];
    var done = stops.filter(function (s) { return s.status === 'done'; }).length;
    var terminal = stops.filter(function (s) { return s.status === 'done' || s.status === 'failed'; }).length;
    var allHandled = stops.length > 0 && terminal === stops.length;
    var allPicked = !pickupData || pickupData.all_picked;

    // Header
    var headHtml = '<div class="row"><div class="row-main"><div class="row-title">' + stops.length + ' stops · ' +
      done + ' delivered</div><div class="row-sub">' + Hub.esc(r.status) + (r.ai_optimized ? ' · optimized' : '') + '</div>' + routePayLine(r) + '</div></div>';
    if (allPicked && r.status !== 'completed' && routeData.full_route_url) {
      headHtml += '<a class="btn ghost block" href="' + routeData.full_route_url + '" target="_blank" rel="noopener" style="margin-top:8px" data-i18n>🧭 Navigate full route</a>';
    }
    if (allHandled && r.status !== 'completed') {
      headHtml += '<button class="btn gold block" id="complete-route" type="button" style="margin-top:8px" data-i18n>Complete route</button>';
    }
    if (r.status === 'completed') headHtml += availabilityHtml();
    head.innerHTML = headHtml;
    wireHead();

    // Mode: pickup gate first
    if (!allPicked && r.status !== 'completed') {
      pickSection.hidden = false; delivSection.hidden = true; stopGps();
      renderPickup();
    } else {
      pickSection.hidden = true; delivSection.hidden = false;
      renderDelivery();
      if (r.status === 'started' && !allHandled) startGps(); else stopGps();
    }
    refresh();
  }

  // ---- Pickup gate (Phase 3) ----
  // Re-confirm each bowl the kitchen prepped, then enter your PIN ONCE per order. An order
  // can't go out for delivery until every bowl is driver-confirmed; unchecked bowls are
  // flagged missing to the kitchen.
  function renderPickup() {
    var list = document.getElementById('pickup-list');
    var stops = (pickupData && pickupData.stops) || [];
    list.innerHTML = stops.map(function (s) {
      if (s.picked) return '<div class="card"><div class="row-title">' + Hub.esc(s.first_name) + ' <span class="pick-done">✓ confirmed</span></div></div>';
      var bowls = (s.bowls || []).map(function (bw) {
        var meta = (bw.size_oz ? bw.size_oz + ' oz · ' : '') + (bw.prepped_by ? 'prepped by ' + Hub.esc(bw.prepped_by) : (bw.prepped ? 'prepped' : 'not prepped yet'));
        return '<div class="bowl-row"><button class="unit bowlchk" data-bowl="' + Hub.esc(bw.id) + '" type="button">○</button>' +
          '<span class="bowl-name">' + Hub.esc(bw.name) + (bw.avocado ? ' + ½ avo' : '') +
          '<span class="small" style="display:block;font-weight:400">' + meta + '</span></span></div>';
      }).join('');
      return '<div class="card" data-stopcard="' + s.stop_id + '"><div class="row-title">' + Hub.esc(s.first_name) +
        ' <span class="small">· ' + s.total_bowls + ' bowls</span></div>' + bowls +
        '<button class="btn block gold confirm-pick" data-stop="' + s.stop_id + '" type="button" style="margin-top:10px" data-i18n>Confirm pickup</button></div>';
    }).join('') || '<p class="row-sub" data-i18n>No bowls to load.</p>';

    Array.prototype.forEach.call(list.querySelectorAll('.bowlchk'), function (u) {
      u.addEventListener('click', function () { u.classList.toggle('on'); u.textContent = u.classList.contains('on') ? '✓' : '○'; });
    });
    Array.prototype.forEach.call(list.querySelectorAll('.confirm-pick'), function (btn) {
      btn.addEventListener('click', function () { confirmPickup(btn.getAttribute('data-stop')); });
    });

    var startBtn = document.getElementById('start-deliveries');
    startBtn.style.display = (pickupData && pickupData.all_picked) ? 'block' : 'none';
  }

  function confirmPickup(stopId) {
    var card = document.querySelector('[data-stopcard="' + stopId + '"]');
    if (!card) return;
    var confirmed = [], missing = [];
    Array.prototype.forEach.call(card.querySelectorAll('.bowlchk'), function (u) {
      var bid = u.getAttribute('data-bowl');
      if (u.classList.contains('on')) confirmed.push(bid); else missing.push(bid);
    });
    if (!confirmed.length && !missing.length) return;
    if (missing.length && !window.confirm(missing.length + ' bowl(s) are not checked — they will be flagged missing to the kitchen. Continue?')) return;
    askPin('Your PIN to confirm pickup', function (pin, h) {
      Hub.api('/api/hub/driver/pickup', { method: 'POST', body: { stop_id: stopId, pin: pin, confirmed: confirmed, missing: missing } })
        .then(function (resp) {
          if (resp && resp.ok) { h.done(); Hub.toast(resp.complete ? 'Confirmed ✓' : 'Saved — missing bowls flagged'); loadAll(); }
          else { h.fail(resp && resp.error); }
        });
    });
  }
  function startBtnEnable() { var b = document.getElementById('start-deliveries'); if (b) b.style.display = 'block'; }

  document.getElementById('start-deliveries').addEventListener('click', function () {
    var go = function () { delivSection.scrollIntoView({ behavior: 'smooth' }); loadAll(); };
    if (routeData.route.status === 'assigned') {
      Hub.api('/api/hub/driver/route', { method: 'POST', body: { action: 'start' } }).then(function (resp) {
        if (resp && resp.ok) { Hub.toast('Deliveries started'); go(); } else Hub.toast((resp && resp.error) || 'Error');
      });
    } else go();
  });

  // ---- Delivery mode ----
  function renderDelivery() {
    var stops = routeData.stops || [];
    var cur = stops.find(function (s) { return s.status !== 'done' && s.status !== 'failed'; });
    var curEl = document.getElementById('current-stop');
    if (cur) {
      var nav = cur.nav_started_at;
      var eta = cur.eta_clock ? '<span class="stop-eta">ETA ' + Hub.esc(cur.eta_clock) + '</span>' : '';
      curEl.innerHTML = '<div class="card cur-card"><div class="cur-name">' + Hub.esc(cur.first_name) + ' ' + eta + '</div>' +
        '<div class="stop-addr">' + Hub.esc(cur.address || '') + '</div>' +
        (cur.delivery_notes ? '<div class="stop-note">📝 ' + Hub.esc(cur.delivery_notes) + '</div>' : '') +
        '<div class="cur-actions">' +
        '<button class="btn gold" id="nav-btn" type="button" data-i18n>' + (nav ? '🧭 Re-open navigation' : '🧭 Navigate (notify customer)') + '</button>' +
        (nav && !cur.arriving_at ? '<button class="btn ghost" id="arrive-btn" type="button" data-i18n>📍 Arriving soon</button>' : '') +
        '<button class="btn" id="deliver-open" type="button" style="background:var(--green);color:#fff" data-i18n>📷 Mark delivered</button>' +
        '<button class="btn ghost small" id="fail-open" type="button" data-i18n>Report a problem</button>' +
        '</div></div>';
      document.getElementById('nav-btn').addEventListener('click', function () { navStart(cur); });
      var ab = document.getElementById('arrive-btn'); if (ab) ab.addEventListener('click', function () { arriving(cur); });
      document.getElementById('deliver-open').addEventListener('click', function () { openSheet(cur, 'deliver'); });
      document.getElementById('fail-open').addEventListener('click', function () { openSheet(cur, 'fail'); });
    } else {
      curEl.innerHTML = '<div class="card"><div class="row-title" data-i18n>All stops handled 🎉</div><p class="small" data-i18n>Tap “Complete route” above, then make yourself available for more orders.</p></div>';
    }

    document.getElementById('stops').innerHTML = stops.map(function (s, i) {
      return '<div class="row"><div class="row-main"><div class="row-title">' + (i + 1) + '. ' + Hub.esc(s.first_name) +
        '</div><div class="row-sub">' + Hub.esc(s.address || '') + '</div></div>' + stopPill(s, cur) + '</div>';
    }).join('');
  }

  // Plain-English status pill for a stop (driver-friendly + on-brand colors).
  function stopPill(s, cur) {
    if (s.status === 'done') return '<span class="stop-pill is-done" data-i18n>Done</span>';
    if (s.status === 'failed') return '<span class="stop-pill is-failed" data-i18n>Failed</span>';
    if (cur && s.stop_id === cur.stop_id) return '<span class="stop-pill cur" data-i18n>Current</span>';
    var map = { picked: ['Loaded', 'loaded'], en_route: ['On the way', 'way'], arriving: ['Almost there', 'near'], pending: ['Waiting', 'wait'] };
    var m = map[s.status] || ['Waiting', 'wait'];
    return '<span class="stop-pill ' + m[1] + '" data-i18n>' + m[0] + '</span>';
  }

  function navStart(stop) {
    Hub.api('/api/hub/driver/stop', { method: 'POST', body: { stop_id: stop.stop_id, action: 'nav_start' } }).then(function (resp) {
      if (resp && resp.ok) Hub.toast('Customer notified — on the way');
      if (stop.directions_url) window.open(stop.directions_url, '_blank', 'noopener');
      loadAll();
    });
  }
  function arriving(stop) {
    Hub.api('/api/hub/driver/stop', { method: 'POST', body: { stop_id: stop.stop_id, action: 'arriving' } }).then(function (resp) {
      Hub.toast(resp && resp.ok ? 'Arriving-soon sent' : (resp && resp.error) || 'Error'); loadAll();
    });
  }

  // ---- Deliver / fail sheet ----
  var backdrop = document.getElementById('sheet-backdrop');
  function openSheet(stop, m) {
    current = stop;
    document.getElementById('sheet-title').textContent = stop.first_name;
    document.getElementById('proof-photo').value = '';
    document.getElementById('skip-photo').checked = false;
    document.getElementById('fail-note').value = '';
    setMode(m || 'deliver');
    backdrop.style.display = 'block';
    sheet.style.display = 'block';
    sheet.classList.remove('show'); void sheet.offsetWidth; sheet.classList.add('show'); // restart slide-up
  }
  function closeSheet() { sheet.style.display = 'none'; backdrop.style.display = 'none'; current = null; }
  function scrollToCurrent() { var el = document.getElementById('current-stop'); if (el && el.firstChild) el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
  function setMode(m) {
    mode = m;
    document.getElementById('sheet-mode-deliver').style.display = m === 'deliver' ? 'block' : 'none';
    document.getElementById('sheet-mode-fail').style.display = m === 'fail' ? 'block' : 'none';
    document.getElementById('toggle-mode').textContent = m === 'deliver' ? 'Switch to failed' : 'Switch to delivered';
    refresh();
  }
  document.getElementById('toggle-mode').addEventListener('click', function () { setMode(mode === 'deliver' ? 'fail' : 'deliver'); });
  document.getElementById('sheet-close').addEventListener('click', closeSheet);
  backdrop.addEventListener('click', closeSheet);

  document.getElementById('deliver-btn').addEventListener('click', function () {
    if (!current) return;
    var photoFile = document.getElementById('proof-photo').files[0];
    var skip = document.getElementById('skip-photo').checked;
    if (!photoFile && !skip) { Hub.toast('Take a photo, or check “couldn’t take a photo”.'); return; }
    var btn = this; btn.disabled = true;
    Promise.all([
      photoFile ? Driver.fileToDataUrl(photoFile) : Promise.resolve(null),
      Driver.geo()
    ]).then(function (vals) {
      return Hub.api('/api/hub/driver/delivery/complete', { method: 'POST', body: {
        order_id: current.order_id, route_id: routeData.route.id, stop_id: current.stop_id,
        proof_photo: vals[0], geo: vals[1], on_time: true
      } });
    }).then(function (resp) {
      btn.disabled = false;
      if (resp && resp.ok) { Hub.toast('Delivered — customer notified'); closeSheet(); loadAll().then(scrollToCurrent); }
      else Hub.toast((resp && resp.error) || 'Error');
    });
  });
  document.getElementById('fail-btn').addEventListener('click', function () {
    if (!current) return;
    var btn = this; btn.disabled = true;
    Driver.geo().then(function (geo) {
      return Hub.api('/api/hub/driver/delivery/fail', { method: 'POST', body: {
        order_id: current.order_id, route_id: routeData.route.id, stop_id: current.stop_id,
        reason: document.getElementById('fail-reason').value, note: document.getElementById('fail-note').value, geo: geo
      } });
    }).then(function (resp) {
      btn.disabled = false;
      if (resp && resp.ok) { Hub.toast('Marked failed'); closeSheet(); loadAll().then(scrollToCurrent); }
      else Hub.toast((resp && resp.error) || 'Error');
    });
  });

  // ---- Header actions (complete route, availability) ----
  function wireHead() {
    var cb = document.getElementById('complete-route');
    if (cb) cb.addEventListener('click', function () {
      Hub.api('/api/hub/driver/route', { method: 'POST', body: { action: 'complete' } }).then(function (resp) {
        if (resp && resp.ok) { Hub.toast('Route completed'); loadAll(); } else Hub.toast((resp && resp.error) || 'Error');
      });
    });
    var av = document.getElementById('avail-toggle');
    if (av) av.addEventListener('click', function () {
      var next = av.getAttribute('data-on') !== '1';
      Hub.api('/api/hub/driver/available', { method: 'POST', body: { available: next } }).then(function (resp) {
        if (resp && resp.ok) { Hub.toast(next ? 'You’re available for orders' : 'Marked unavailable'); loadAll(); }
      });
    });
  }
  function availabilityHtml() {
    return '<div style="margin-top:10px"><button class="btn block" id="avail-toggle" data-on="0" type="button" style="background:var(--green);color:#fff" data-i18n>Make me available for more orders</button></div>';
  }

  // ---- GPS pings (foreground; powers live ETA + auto "arriving soon") ----
  function pingOnce() {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(function (pos) {
      Hub.api('/api/hub/driver/location', { method: 'POST', body: { lat: pos.coords.latitude, lng: pos.coords.longitude, acc: pos.coords.accuracy } })
        .then(function (resp) { if (resp && resp.arriving_sent) loadAll(); }).catch(function () {});
    }, function () {}, { enableHighAccuracy: true, maximumAge: 20000, timeout: 8000 });
  }
  function startGps() { if (gpsTimer) return; pingOnce(); gpsTimer = setInterval(pingOnce, 45000); }
  function stopGps() { if (gpsTimer) { clearInterval(gpsTimer); gpsTimer = null; } }
  document.addEventListener('visibilitychange', function () { if (!document.hidden && routeData && routeData.route && routeData.route.status === 'started') { pingOnce(); loadAll(); } });

  function cssEsc(s) { return String(s).replace(/["\\\]]/g, '\\$&'); }

  (window.Driver && Driver.guard ? Driver.guard() : Hub.guard(['driver', 'owner'])).then(function (me) { if (me) loadAll(); });
})();
</script>
</body>
</html>
