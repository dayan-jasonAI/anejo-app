<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Lunch Count — Añejo Catering Co.</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/assets/img/favicon.png">
<style>
  :root{--black:#0D0D0D;--green:#1A3D2E;--gold:#C6A85B;--gold-deep:#C08418;--cream:#F5F2EC;--ink:#1f2a24;--muted:#6f7b74;--line:#e3ddcf;--crit:#b3402f}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased}
  .hero{background:var(--black);color:var(--cream);padding:30px 22px 24px;text-align:center}
  .hero .brand{font-family:Georgia,serif;letter-spacing:7px;color:var(--gold);font-size:22px;font-weight:600}
  .hero .sub{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:rgba(245,242,236,.7);margin-top:8px}
  .wrap{max-width:460px;margin:0 auto;padding:24px 20px 60px}
  .card{background:#fff;border:1px solid var(--line);border-top:4px solid var(--gold);border-radius:14px;padding:24px;box-shadow:0 8px 30px rgba(26,61,46,.07)}
  .site{font-size:22px;font-weight:700;color:var(--green)}
  .meta{color:var(--muted);font-size:14px;margin:6px 0 2px}
  .meta b{color:var(--ink)}
  .win{display:inline-block;background:#fff8e9;border:1px solid var(--gold);color:var(--gold-deep);font-weight:700;font-size:13px;border-radius:20px;padding:5px 14px;margin-top:12px}
  .banner{border-radius:9px;padding:11px 14px;font-size:13.5px;line-height:1.5;margin-top:14px}
  .banner.warn{background:#fbf3da;border:1px solid var(--gold);color:#6b5320}
  .banner.crit{background:#f7e3de;border:1px solid var(--crit);color:#7a2418}
  .banner.ok{background:#e1efe5;border:1px solid var(--green);color:var(--green)}
  .lab{display:block;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--green);margin:22px 0 8px}
  .counter{display:flex;align-items:center;gap:14px;justify-content:center}
  .counter button{width:58px;height:58px;border-radius:50%;border:2px solid var(--green);background:#fff;color:var(--green);font-size:28px;font-weight:700;cursor:pointer;line-height:1}
  .counter button:active{background:var(--green);color:#fff}
  .counter input{width:110px;text-align:center;font-size:46px;font-weight:800;color:var(--green);border:none;border-bottom:3px solid var(--line);background:transparent;padding:4px 0}
  .counter input:focus{outline:none;border-color:var(--gold)}
  .btn{display:block;width:100%;margin-top:24px;padding:16px;border:none;border-radius:999px;font-size:14px;letter-spacing:1.5px;text-transform:uppercase;font-weight:800;cursor:pointer;background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:#1c1606;box-shadow:0 8px 22px rgba(192,132,24,.26)}
  .btn:disabled{opacity:.5;cursor:default;box-shadow:none}
  .fine{font-size:12px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.5}
  .state{text-align:center;padding:50px 20px;color:var(--muted)}
  .ok-wrap{text-align:center;padding:14px 0}
  .ok-wrap .check{width:64px;height:64px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:var(--gold);font-size:32px}
  .ok-wrap h2{color:var(--green);font-size:22px;margin-bottom:8px}
  .ok-wrap p{color:var(--muted);font-size:15px;line-height:1.5}
  .total{font-size:13px;color:var(--muted);margin-top:10px}
</style>
</head>
<body>
<div class="hero"><div class="brand">AÑEJO</div><div class="sub">Daily Lunch Count</div></div>
<div class="wrap"><div id="app" class="state">Loading…</div></div>
<script>
  var token=(new URLSearchParams(location.search)).get('t')||'';
  var ctx=null;
  var app=document.getElementById('app');
  function money(c){ return '$'+((Number(c)||0)/100).toFixed(2); }
  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

  if(!token){ app.innerHTML='This link is missing its code. Please use the link Añejo gave your office.'; }
  else {
    fetch('/api/contract/site?t='+encodeURIComponent(token)).then(function(r){return r.json();}).then(function(d){
      ctx=d;
      if(!d||!d.ok){ app.className='state'; app.innerHTML='This link is not valid. Please contact Añejo.'; return; }
      render();
    }).catch(function(){ app.className='state'; app.innerHTML='Could not load. Check your connection and try again.'; });
  }

  function render(){
    app.className='';
    if(!ctx.delivers_today){
      app.innerHTML='<div class="card"><div class="site">'+esc(ctx.site)+'</div>'+
        '<div class="meta">'+esc(ctx.weekday)+', '+esc(ctx.date)+'</div>'+
        '<div class="banner warn">No lunch delivery is scheduled for your office today. Deliveries run Monday–Wednesday.</div></div>';
      return;
    }
    var pre=ctx.already;
    var start=pre?pre.count:'';
    var warn = ctx.past_cutoff
      ? '<div class="banner crit">It’s past the '+esc(ctx.cutoff)+' AM cut-off. We’ll do our best, but late counts are a <b>rush</b> and a small rush fee applies.</div>'
      : '<div class="banner ok">Please submit by <b>'+esc(ctx.cutoff)+' AM</b> so the kitchen can prep your lunches fresh.</div>';
    var preNote = pre ? '<div class="banner ok">Already received today: <b>'+pre.count+'</b>. You can update it below.</div>' : '';
    app.innerHTML=
      '<div class="card">'+
        '<div class="site">'+esc(ctx.site)+'</div>'+
        '<div class="meta">'+esc(ctx.account)+' &middot; '+esc(ctx.weekday)+', '+esc(ctx.date)+'</div>'+
        '<div class="win">🍱 Delivery '+esc(ctx.window)+'</div>'+
        warn + preNote +
        '<span class="lab">How many lunches today?</span>'+
        '<div class="counter"><button type="button" onclick="bump(-1)">−</button>'+
          '<input id="n" type="number" inputmode="numeric" min="1" max="500" value="'+start+'" placeholder="0">'+
          '<button type="button" onclick="bump(1)">+</button></div>'+
        '<button class="btn" id="go" onclick="submitCount()">'+(pre?'Update count':'Submit head count')+'</button>'+
        '<div class="fine">$'+ (ctx.price_per_lunch_cents/100).toFixed(2) +' per lunch · delivery fee applies per office. You’ll get an invoice from Añejo Catering Co.</div>'+
      '</div>';
  }
  function bump(d){ var i=document.getElementById('n'); var v=Math.max(0,(parseInt(i.value,10)||0)+d); i.value=v||''; }
  function submitCount(){
    var i=document.getElementById('n'); var n=parseInt(i.value,10);
    if(!n||n<1){ i.focus(); return; }
    var b=document.getElementById('go'); b.disabled=true; b.textContent='Sending…';
    fetch('/api/contract/headcount',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({t:token,count:n})})
      .then(function(r){return r.json();}).then(function(d){
        if(d&&d.ok){ confirmed(d); }
        else { b.disabled=false; b.textContent='Submit head count'; app.querySelector('.card').insertAdjacentHTML('beforeend','<div class="banner crit">'+esc((d&&d.error)||'Could not submit. Please try again.')+'</div>'); }
      }).catch(function(){ b.disabled=false; b.textContent='Submit head count'; });
  }
  function confirmed(d){
    app.innerHTML='<div class="card ok-wrap"><div class="check">✓</div>'+
      '<h2>Count received — '+d.count+' lunches</h2>'+
      '<p>'+esc(d.site)+' &middot; '+esc(d.weekday)+'<br>Fresh-prepped and delivered <b>'+esc(d.window)+'</b>.</p>'+
      (d.is_rush?'<div class="banner crit" style="text-align:left">Submitted after cut-off — a rush fee of '+money(d.rush_fee_cents)+' was added.</div>':'')+
      '<div class="total">'+d.count+' × '+money(d.price_per_lunch_cents)+' + '+money(d.delivery_fee_cents)+' delivery'+(d.rush_fee_cents?' + '+money(d.rush_fee_cents)+' rush':'')+' = <b>'+money(d.total_cents)+'</b></div>'+
      '<p style="margin-top:14px;font-size:13px">Need to change it? Just reopen this link before '+esc(ctx.cutoff)+' AM.</p></div>';
  }
</script>
</body>
</html>
