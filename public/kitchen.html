<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen — Añejo Orders</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/assets/img/favicon.png">
<style>
:root{--black:#0D0D0D;--green:#1A3D2E;--gold:#C6A85B;--gold-dark:#8B6B3E;--cream:#F5F2EC;--cream-dark:#EAE5D8;--ink:#1A1A1A;--muted:#6b6b6b;--line:rgba(26,61,46,.15)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--cream);color:var(--ink)}
header{background:var(--black);color:var(--gold);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0}
header h1{font-size:18px;letter-spacing:3px}
header button{background:none;border:1px solid rgba(198,168,91,.4);color:var(--gold);border-radius:5px;padding:6px 12px;font-size:12px;cursor:pointer}
.wrap{max-width:1000px;margin:0 auto;padding:20px}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filters button{border:1px solid var(--line);background:#fff;border-radius:20px;padding:7px 16px;font-size:13px;cursor:pointer;color:var(--muted)}
.filters button.on{background:var(--green);color:var(--cream);border-color:var(--green)}
.order{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:12px;border-left:5px solid var(--gold)}
.order.paid{border-left-color:var(--green)}
.order.fulfilled{border-left-color:#999;opacity:.7}
.order.pending{border-left-color:#d4a017}
.o-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.o-when{font-weight:700;color:var(--green)}
.o-status{font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--cream-dark);color:var(--muted)}
.o-status.paid{background:#e7f0ea;color:var(--green)}
.o-status.pending{background:#fbf3da;color:var(--gold-dark)}
.o-items{font-size:15px;line-height:1.7}
.o-items b{color:var(--green)}
.o-foot{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:13px;color:var(--muted)}
.o-foot button{background:var(--gold);border:none;border-radius:5px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
.gate{max-width:360px;margin:60px auto;background:#fff;border:1px solid var(--line);border-radius:14px;padding:30px;text-align:center}
.gate input{width:100%;padding:12px;border:1px solid var(--line);border-radius:8px;margin:12px 0;font:inherit}
.gate button{width:100%;background:var(--green);color:var(--cream);border:none;border-radius:8px;padding:12px;font-weight:700;cursor:pointer}
.empty{text-align:center;color:var(--muted);padding:40px}
</style>
</head>
<body>
<header><h1>AÑEJO · KITCHEN</h1><button onclick="logout()">Change key</button></header>
<div class="wrap" id="app"><p class="empty">Loading…</p></div>
<script>
const $=(id)=>document.getElementById(id);
const KEYK='anejo:kitchenKey';
let filter='paid';
const money=(c)=>'$'+((c||0)/100).toFixed(2);
const esc=(s)=>String(s==null?'':s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
function logout(){localStorage.removeItem(KEYK);render();}
window.logout=logout;
function gate(){$('app').innerHTML='<div class="gate"><h2 style="color:var(--green)">Kitchen access</h2><input id="k" type="password" placeholder="Kitchen key" autofocus><button onclick="saveKey()">Open orders</button></div>';}
function saveKey(){const v=$('k').value.trim();if(v){localStorage.setItem(KEYK,v);load();}}
window.saveKey=saveKey;
async function setStatus(id,status){const key=localStorage.getItem(KEYK);
  await fetch('/api/orders',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key,id,status})});load();}
window.setStatus=setStatus;
function setFilter(f){filter=f;load();}
window.setFilter=setFilter;
async function load(){
  const key=localStorage.getItem(KEYK); if(!key){gate();return;}
  let data;
  try{ const r=await fetch('/api/orders?key='+encodeURIComponent(key)+(filter?'&status='+filter:'')); if(r.status===401){logout();return;} data=await r.json(); }
  catch{ $('app').innerHTML='<p class="empty">Could not load orders.</p>'; return; }
  const orders=data.orders||[];
  const tabs=['paid','pending','fulfilled',''].map(f=>'<button class="'+(filter===f?'on':'')+'" onclick="setFilter(\''+f+'\')">'+(f||'all')+'</button>').join('');
  const rows=orders.length?orders.map(o=>{
    let items=[];try{items=JSON.parse(o.items||'[]');}catch(_){}
    const il=items.map(i=>'<b>'+i.qty+'×</b> '+esc(i.name)).join(' · ');
    const win=o.delivery_window==='dinner'?'Dinner 5–7':'Lunch 11–1';
    return '<div class="order '+esc(o.status)+'"><div class="o-top"><span class="o-when">'+esc(o.delivery_date||'—')+' · '+win+'</span><span class="o-status '+esc(o.status)+'">'+esc(o.status)+'</span></div>'+
      '<div class="o-items">'+il+'</div>'+
      '<div class="o-foot"><span>est. '+money(o.total_estimate_cents)+' · '+esc(o.customer_email||'')+'</span>'+
      (o.status!=='fulfilled'?'<button onclick="setStatus(\''+esc(o.id)+'\',\'fulfilled\')">Mark fulfilled</button>':'')+'</div></div>';
  }).join(''):'<p class="empty">No '+(filter||'')+' orders.</p>';
  $('app').innerHTML='<div class="filters">'+tabs+'</div>'+rows;
}
function render(){ if(localStorage.getItem(KEYK)) load(); else gate(); }
render();
</script>
</body>
</html>
