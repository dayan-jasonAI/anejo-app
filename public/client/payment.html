<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update payment method — Añejo Catering Co.</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/assets/img/favicon.png">
<style>
  :root{--black:#0D0D0D;--green:#1A3D2E;--gold:#C6A85B;--gold-deep:#C08418;--cream:#F5F2EC;--ink:#1f2a24;--muted:#6f7b74;--line:#e3ddcf;--crit:#b3402f}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--cream);color:var(--ink)}
  .hero{background:radial-gradient(120% 120% at 50% 0%,#16331f 0%,var(--black) 70%);color:var(--cream);padding:26px 22px 28px;text-align:center}
  .hero img{height:48px;margin-bottom:8px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.4))}
  .hero .brand{font-family:Georgia,serif;letter-spacing:7px;color:var(--gold);font-size:20px}
  .wrap{max-width:440px;margin:0 auto;padding:22px 18px 60px}
  .card{background:#fff;border:1px solid var(--line);border-top:4px solid var(--gold);border-radius:16px;padding:22px;box-shadow:0 10px 34px rgba(26,61,46,.08)}
  h1{font-size:21px;color:var(--green);margin-bottom:6px}
  p.lead{color:var(--muted);font-size:14px;line-height:1.5;margin-bottom:18px}
  label.lab{display:block;font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--green);margin-bottom:8px}
  #card{border:1px solid var(--line);border-radius:10px;padding:6px 10px;background:var(--cream);min-height:52px}
  .btn{display:block;width:100%;margin-top:18px;padding:15px;border:none;border-radius:999px;font-size:14px;letter-spacing:1px;text-transform:uppercase;font-weight:800;cursor:pointer;background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:#1c1606}
  .btn:disabled{opacity:.5;cursor:default}
  .msg{margin-top:14px;font-size:13.5px;border-radius:10px;padding:11px 13px;display:none}
  .msg.err{display:block;background:#f7e3de;border:1px solid var(--crit);color:#7a2418}
  .msg.ok{display:block;background:#e1efe5;border:1px solid var(--green);color:var(--green)}
  .fine{font-size:12px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.5}
  a.back{display:inline-block;color:var(--gold-deep);font-weight:700;text-decoration:none;font-size:13px;margin-top:16px}
  .lock{font-size:12px;color:var(--muted);display:flex;gap:6px;align-items:center;justify-content:center;margin-top:10px}
</style>
</head>
<body>
<div class="hero"><img src="/assets/img/emblem.png" alt="Añejo"><div class="brand">AÑEJO</div></div>
<div class="wrap"><div class="card">
  <h1>Update payment method</h1>
  <p class="lead">Your new card replaces the one on file for your weekly subscription — future deliveries charge it. Your card is entered securely with Square; we never see or store the number.</p>
  <label class="lab" for="card">Card</label>
  <div id="card"></div>
  <button class="btn" id="save" disabled>Save new card</button>
  <div class="msg" id="msg"></div>
  <div class="lock">🔒 Secured by Square · PCI-compliant</div>
  <div style="text-align:center"><a class="back" href="/client/dashboard.html">← Back to my account</a></div>
</div></div>
<script>
(function () {
  var msg = document.getElementById('msg'), saveBtn = document.getElementById('save');
  var card = null, payments = null;
  function show(kind, text) { msg.className = 'msg ' + kind; msg.textContent = text; }
  async function boot() {
    var cfg;
    try { cfg = await (await fetch('/api/square-config')).json(); } catch (e) { show('err', 'Could not reach the server.'); return; }
    if (!cfg || !cfg.applicationId || !cfg.locationId) { show('err', 'Payments are not configured yet.'); return; }
    var src = cfg.env === 'production' ? 'https://web.squarecdn.com/v1/square.js' : 'https://sandbox.web.squarecdn.com/v1/square.js';
    await new Promise(function (res, rej) { var s = document.createElement('script'); s.src = src; s.onload = res; s.onerror = rej; document.head.appendChild(s); }).catch(function () {});
    if (!window.Square) { show('err', 'Could not load the secure card field.'); return; }
    try {
      payments = window.Square.payments(cfg.applicationId, cfg.locationId);
      card = await payments.card();
      await card.attach('#card');
      saveBtn.disabled = false;
    } catch (e) { show('err', 'Could not load the card field: ' + (e.message || e)); }
  }
  saveBtn.addEventListener('click', async function () {
    if (!card) return;
    msg.className = 'msg'; saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
    try {
      var r = await card.tokenize();
      if (r.status !== 'OK' || !r.token) throw new Error((r.errors && r.errors[0] && r.errors[0].message) || 'Card not accepted.');
      var resp = await fetch('/api/subscriptions/card', { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin', body: JSON.stringify({ source_id: r.token }) });
      var d = await resp.json();
      if (!resp.ok || !d.ok) throw new Error(d.error || 'Could not save the card.');
      show('ok', 'Card updated' + (d.brand && d.last4 ? ' — ' + d.brand + ' ending ' + d.last4 : '') + '. Future deliveries will charge it. 💚');
      saveBtn.textContent = 'Saved ✓';
      setTimeout(function () { location.href = '/client/dashboard.html'; }, 2200);
    } catch (e) {
      show('err', e.message || 'Could not save the card.'); saveBtn.disabled = false; saveBtn.textContent = 'Save new card';
    }
  });
  boot();
})();
</script>
</body>
</html>
