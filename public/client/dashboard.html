<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0D0D0D">
<title>My Plan — Añejo</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/assets/img/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600&display=swap" rel="stylesheet">
<style>
:root{--black:#0D0D0D;--green:#1A3D2E;--gold:#C6A85B;--gold-dark:#8B6B3E;--cream:#F5F2EC;--cream-dark:#EAE5D8;--ink:#1A1A1A;--muted:#6b6b6b;--line:rgba(26,61,46,.15)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Josefin Sans',-apple-system,sans-serif;background:var(--cream);color:var(--ink);line-height:1.6}
a{color:var(--gold-dark)}
.skip-link{position:absolute;left:-9999px;top:0;z-index:100;background:var(--gold);color:var(--black);padding:10px 16px;font-weight:600;border-radius:0 0 4px 0;text-decoration:none}
.skip-link:focus{left:0}
nav{background:var(--black);border-bottom:1px solid rgba(198,168,91,.2)}
.nav-inner{max-width:760px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;color:var(--gold);text-decoration:none;font-family:'Cormorant Garamond',serif;font-weight:600;letter-spacing:5px;font-size:20px}
.logo img{height:32px}
.nav-r button{background:none;border:1px solid rgba(198,168,91,.4);color:var(--gold);border-radius:4px;padding:6px 12px;font:600 11px/1 'Josefin Sans';letter-spacing:1px;text-transform:uppercase;cursor:pointer}
.wrap{max-width:760px;margin:0 auto;padding:32px 24px 72px}
h1{font-weight:300;font-size:30px;margin-bottom:4px}h1 strong{color:var(--green);font-weight:600}
.sub{color:var(--muted);font-size:14px;margin-bottom:24px}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:24px;margin-bottom:18px}
.card.gold{border-top:3px solid var(--gold)}
.k{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold-dark);font-weight:600;margin-bottom:10px}
.macros{display:flex;gap:18px;flex-wrap:wrap}
.macro{text-align:center}.macro .v{font-size:26px;font-weight:300;color:var(--green)}.macro .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.btn{display:inline-block;background:var(--gold);color:var(--black);text-decoration:none;border-radius:4px;padding:11px 18px;font:700 12px/1 'Josefin Sans';letter-spacing:1.5px;text-transform:uppercase;margin-top:8px}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--green)}
.badge{font-size:10px;letter-spacing:.5px;text-transform:uppercase;font-weight:600;padding:3px 8px;border-radius:20px;background:var(--cream-dark);color:var(--muted)}
.badge.active,.badge.subscribed{background:#e7f0ea;color:var(--green)}
.gate{max-width:420px;margin:60px auto;background:#fff;border:1px solid var(--line);border-top:4px solid var(--gold);border-radius:14px;padding:34px 30px;text-align:center}
.gate h2{color:var(--green);font-weight:600;margin-bottom:8px}.gate p{color:var(--muted);font-size:14px;margin-bottom:18px}
.gate input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:8px;font:inherit;background:var(--cream);margin-bottom:12px}
.empty{background:#fff;border:1px dashed var(--line);border-radius:12px;padding:30px;text-align:center;color:var(--muted);font-size:14px}
</style>
</head>
<body>
<a href="#main" class="skip-link">Skip to content</a>
<nav><div class="nav-inner">
  <a href="/" class="logo"><img src="/assets/img/emblem.png" alt="Añejo"><span>AÑEJO</span></a>
  <div class="nav-r"><button id="signout" style="display:none" onclick="signOut()">Sign out</button></div>
</div></nav>
<main class="wrap" id="main"><p class="muted">Loading…</p></main>
<script>
const $=(id)=>document.getElementById(id);
const esc=(s)=>String(s==null?'':s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
async function signOut(){try{await fetch('/api/auth/logout',{method:'POST'});}catch(_){}location.reload();}
window.signOut=signOut;
async function requestLink(e){e.preventDefault();const email=$('gemail').value.trim();if(!email)return;
  const btn=e.target.querySelector('button');btn.disabled=true;btn.textContent='Sending…';
  try{const r=await fetch('/api/auth/request-link',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,type:'client'})});
    if(!r.ok)throw new Error();$('main').innerHTML='<div class="gate"><h2>Check your email</h2><p>We sent a sign-in link to <strong>'+esc(email)+'</strong>.</p></div>';
  }catch(_){btn.disabled=false;btn.textContent='Send sign-in link';}return false;}
window.requestLink=requestLink;
function gate(){$('main').innerHTML='<div class="gate"><h2>Member sign-in</h2><p>Enter your email for a one-time sign-in link to view your plan.</p>'+
  '<form onsubmit="return requestLink(event)"><input id="gemail" type="email" placeholder="you@email.com" required><button class="btn" type="submit" style="width:100%">Send sign-in link</button></form></div>';}
function money(c){return '$'+((c||0)/100).toFixed(2);}
function rewardsCard(r){
  if(!r)return '';
  var prog;
  if(r.next_tier&&r.next_tier_at_cents){
    var pct=Math.min(100,Math.round((r.lifetime_spend_cents/r.next_tier_at_cents)*100));
    prog='<div style="background:var(--cream-dark);border-radius:20px;height:8px;overflow:hidden;margin:12px 0 6px"><div style="width:'+pct+'%;height:100%;background:var(--gold)"></div></div>'+
      '<div style="font-size:12px;color:var(--muted)">'+money(r.to_next_cents)+' more in orders to reach <strong>'+esc(r.next_tier)+'</strong></div>';
  }else{
    prog='<div style="font-size:12px;color:var(--muted);margin-top:8px">You\u2019ve reached <strong>Immortal</strong> \u2014 our top tier. Thank you.</div>';
  }
  return '<div class="card gold"><div class="k">A\u00f1ejo Rewards \u00b7 '+esc(r.tier_name)+' tier</div>'+
    '<div style="display:flex;align-items:baseline;gap:8px"><span style="font-size:30px;font-weight:300;color:var(--green)">'+(r.points||0).toLocaleString()+'</span><span style="font-size:13px;color:var(--muted)">points</span>'+
    (r.multiplier>1?'<span class="badge active" style="margin-left:auto">'+r.multiplier+'\u00d7 earning</span>':'')+'</div>'+prog+'</div>';
}
function render(d,logs){
  $('signout').style.display='inline-block';
  const c=d.client, p=d.plan, s=d.subscription;
  if(!c){$('main').innerHTML='<div class="empty">No plan is linked to '+esc(d.email)+' yet. Ask your trainer to add you.</div>';return;}
  let html='<h1>Hi, <strong>'+esc(c.name||'there')+'</strong>.</h1><div class="sub">Your Añejo plan & subscription.</div>';
  if(d.rewards)html+=rewardsCard(d.rewards);
  if(p){html+='<div class="card gold"><div class="k">Your daily targets</div><div class="macros">'+
    '<div class="macro"><div class="v">'+(p.daily_calories||'—')+'</div><div class="l">kcal</div></div>'+
    '<div class="macro"><div class="v">'+(p.daily_protein_g||'—')+'</div><div class="l">protein</div></div>'+
    '<div class="macro"><div class="v">'+(p.daily_carbs_g||'—')+'</div><div class="l">carbs</div></div>'+
    '<div class="macro"><div class="v">'+(p.daily_fat_g||'—')+'</div><div class="l">fat</div></div></div>'+
    (p.public_token?'<a class="btn" href="/plan.html?token='+encodeURIComponent(p.public_token)+'">View full plan</a>':'')+'</div>';
  } else { html+='<div class="empty">Your plan is being prepared by your trainer.</div>'; }
  html+='<div class="card"><div class="k">Subscription</div>';
  if(s){html+='<p>Status: <span class="badge '+esc(s.status)+'">'+esc(s.status)+'</span> · '+money(s.weekly_amount_cents)+'/week</p>';}
  else{
    var subQ='/subscribe?client='+encodeURIComponent(c.id)+'&plan='+encodeURIComponent((p&&p.meal_plan_tier)||'plan_12');
    if(p&&p.per_bowl_price_usd!=null) subQ+='&pbp='+encodeURIComponent(p.per_bowl_price_usd);
    if(p&&p.bowl_size_oz) subQ+='&oz='+encodeURIComponent(p.bowl_size_oz);
    html+='<p class="muted" style="margin-bottom:6px">No active subscription.</p>'+(p&&p.meal_plan_tier?'<a class="btn" href="'+subQ+'">Subscribe to my plan</a>':'<a class="btn ghost" href="/#menu">See plans</a>');
  }
  html+='</div>';
  // Track your week — meal log + weight check-in
  if(p){html+='<div class="card"><div class="k">Track your week</div>'+
    '<p style="font-size:14px;margin-bottom:10px">Did you eat your Añejo bowl today?</p>'+
    '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px">'+
      '<button class="btn" type="button" onclick="logMeal(true,this)">Ate it ✓</button>'+
      '<button class="btn ghost" type="button" onclick="logMeal(false,this)">Skipped</button></div>'+
    '<div class="k">Weight check-in</div>'+
    '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'+
      '<input id="wlb" type="number" inputmode="decimal" step="0.1" placeholder="lb" aria-label="Weight in pounds" style="width:120px;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font:inherit;background:var(--cream)">'+
      '<button class="btn" type="button" onclick="logWeight(this)">Log weight</button></div>'+
    '<div id="logMsg" style="font-size:13px;color:var(--green);margin-top:10px;min-height:1px" role="status"></div>'+
    '<div id="recent" style="margin-top:8px"></div></div>';}
  $('main').innerHTML=html;
  renderRecent(logs||{meals:[],weights:[]});
}
function lb(kg){return Math.round(kg/0.4535924*10)/10;}
function renderRecent(logs){
  const el=$('recent'); if(!el)return;
  const w=(logs.weights||[]).slice(0,5), meals=(logs.meals||[]);
  let h=''; const weekAgo=Date.now()-7*864e5;
  const eaten=meals.filter(m=>m.consumed&&new Date(m.date).getTime()>=weekAgo).length;
  if(meals.length)h+='<div class="muted" style="font-size:13px;margin-top:6px">'+eaten+' bowl'+(eaten===1?'':'s')+' logged this week.</div>';
  if(w.length){h+='<div style="margin-top:12px"><div class="k">Recent weight</div>';
    h+=w.map(function(x,i){var cur=lb(x.weight_kg),d='';if(i<w.length-1){var diff=Math.round((cur-lb(w[i+1].weight_kg))*10)/10;if(diff)d=' <span style="color:'+(diff<0?'#2e7d32':'#8a6d3b')+'">('+(diff>0?'+':'')+diff+')</span>';}return '<div style="font-size:14px;padding:3px 0">'+esc(x.date)+' — <strong>'+cur+' lb</strong>'+d+'</div>';}).join('');
    h+='</div>';}
  el.innerHTML=h;
}
async function refreshLogs(){try{renderRecent(await(await fetch('/api/client/log')).json());}catch(_){}}
async function logMeal(consumed,btn){if(btn)btn.disabled=true;
  try{const r=await fetch('/api/client/log',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({kind:'meal',consumed:consumed})});if(!r.ok)throw 0;$('logMsg').textContent=consumed?'Logged — nice work.':'Logged.';await refreshLogs();}
  catch(_){$('logMsg').textContent='Could not save. Try again.';}finally{if(btn)btn.disabled=false;}}
window.logMeal=logMeal;
async function logWeight(btn){var v=parseFloat(($('wlb')||{}).value);if(!v){$('logMsg').textContent='Enter a weight in lb.';return;}
  if(btn)btn.disabled=true;
  try{const r=await fetch('/api/client/log',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({kind:'weight',weight_lb:v})});const d=await r.json();if(!r.ok||!d.ok)throw new Error(d.error||'err');$('wlb').value='';$('logMsg').textContent='Weight logged.';await refreshLogs();}
  catch(e){$('logMsg').textContent=e.message||'Could not save.';}finally{if(btn)btn.disabled=false;}}
window.logWeight=logWeight;
async function init(){let me;try{me=await(await fetch('/api/client/me')).json();}catch{$('main').innerHTML='<div class="empty">Could not reach the server.</div>';return;}
  if(!me.authenticated){gate();return;}
  let logs={meals:[],weights:[]};
  if(me.client){try{logs=await(await fetch('/api/client/log')).json();}catch(_){}}
  render(me,logs);
  loadAddonOffers();}
async function loadAddonOffers(){
  try{
    var d=await(await fetch('/api/client/addons')).json();
    if(!d||!d.offers||!d.offers.length)return;
    var o=d.offers[0];
    var win=o.window==='dinner'?'dinner':'lunch';
    var b=document.createElement('a');
    b.href=o.link;
    b.style.cssText='display:block;margin:0 0 16px;padding:14px 16px;border-radius:12px;text-decoration:none;background:#1A3D2E;color:#F5F2EC;border:1px solid #C6A85B';
    b.innerHTML='<div style="font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#C6A85B;font-weight:700">Today’s '+win+' delivery</div>'+
      '<div style="font-weight:600;margin-top:3px">Add a drink, shake, or a bowl for a friend →</div>';
    var main=document.getElementById('main');
    if(main&&main.firstChild)main.insertBefore(b,main.firstChild);else if(main)main.appendChild(b);
  }catch(_){}
}
init();
</script>
</body>
</html>
