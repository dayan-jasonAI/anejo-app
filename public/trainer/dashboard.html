<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0D0D0D">
<title>Trainer Dashboard — Añejo</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/assets/img/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600&display=swap" rel="stylesheet">
<style>
:root{--black:#0D0D0D;--green:#1A3D2E;--gold:#C6A85B;--gold-dark:#8B6B3E;--cream:#F5F2EC;--cream-dark:#EAE5D8;--ink:#1A1A1A;--muted:#6b6b6b;--line:rgba(26,61,46,.15)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Josefin Sans',-apple-system,sans-serif;background:var(--cream);color:var(--ink);line-height:1.6}
a{color:var(--gold-dark)}
.skip-link{position:absolute;left:-9999px;top:0;z-index:100;background:var(--gold);color:var(--black);padding:10px 16px;border-radius:0 0 4px 0;text-decoration:none;font-weight:600}
.skip-link:focus{left:0}
nav{background:var(--black);border-bottom:1px solid rgba(198,168,91,.2)}
.nav-inner{max-width:1080px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;color:var(--gold);text-decoration:none;font-family:'Cormorant Garamond',serif;font-weight:600;letter-spacing:5px;font-size:20px}
.logo img{height:32px}
.nav-r{display:flex;align-items:center;gap:18px}
.nav-r .role{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(245,242,236,.6)}
.nav-r button{background:none;border:1px solid rgba(198,168,91,.4);color:var(--gold);border-radius:4px;padding:6px 12px;font:600 11px/1 'Josefin Sans';letter-spacing:1px;text-transform:uppercase;cursor:pointer}
.nav-r button:hover{background:rgba(198,168,91,.12)}
.wrap{max-width:1080px;margin:0 auto;padding:32px 24px 72px}
.muted{color:var(--muted)}
h1{font-weight:300;font-size:30px;margin-bottom:4px}
h1 strong{color:var(--green);font-weight:600}
.sub{color:var(--muted);font-size:14px;margin-bottom:26px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:14px}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:20px 22px}
.card .k{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold-dark);font-weight:600}
.card .v{font-size:30px;font-weight:300;color:var(--green);margin-top:6px}
.card.gold{border-top:3px solid var(--gold)}
.ref{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 20px;margin:14px 0 28px;font-size:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.ref code{background:var(--cream-dark);padding:4px 10px;border-radius:6px;font-weight:600;color:var(--green);letter-spacing:1px}
.sec{margin-top:34px}
.sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px;flex-wrap:wrap}
.sec-h h2{font-size:18px;color:var(--green);font-weight:600}
.btn{display:inline-block;background:var(--gold);color:var(--black);text-decoration:none;border:none;cursor:pointer;border-radius:4px;padding:9px 16px;font:700 12px/1 'Josefin Sans';letter-spacing:1.5px;text-transform:uppercase}
.btn:hover{background:var(--cream-dark)}
.btn.sm{padding:6px 11px;font-size:11px}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--green)}
table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}
th,td{text-align:left;padding:12px 16px;font-size:14px;border-bottom:1px solid var(--line)}
th{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gold-dark);background:var(--cream-dark)}
tr:last-child td{border-bottom:none}
.badge{font-size:10px;letter-spacing:.5px;text-transform:uppercase;font-weight:600;padding:3px 8px;border-radius:20px;background:var(--cream-dark);color:var(--muted)}
.badge.active,.badge.subscribed,.badge.plan_ready{background:#e7f0ea;color:var(--green)}
.badge.pending,.badge.draft{background:#fbf3da;color:var(--gold-dark)}
.empty{background:#fff;border:1px dashed var(--line);border-radius:12px;padding:30px;text-align:center;color:var(--muted);font-size:14px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal .box{background:#fff;border-radius:14px;max-width:420px;width:100%;padding:26px}
.modal h3{color:var(--green);font-weight:600;margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fld2{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gold-dark);font-weight:600}
.fld2 input,.fld2 textarea{display:block;width:100%;margin-top:5px;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font:inherit;background:var(--cream);text-transform:none;letter-spacing:0}
.modal-actions{display:flex;gap:10px;margin-top:16px;justify-content:flex-end}
.gate{max-width:420px;margin:60px auto;background:#fff;border:1px solid var(--line);border-top:4px solid var(--gold);border-radius:14px;padding:34px 30px;text-align:center}
.gate h2{color:var(--green);font-weight:600;margin-bottom:8px}
.gate p{color:var(--muted);font-size:14px;margin-bottom:18px}
.gate input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:8px;font:inherit;background:var(--cream);margin-bottom:12px}
.gate .btn{width:100%}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:var(--cream);padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:640px){th:nth-child(3),td:nth-child(3){display:none}}
</style>
</head>
<body>
<a href="#app" class="skip-link">Skip to content</a>
<nav><div class="nav-inner">
  <a href="/" class="logo"><img src="/assets/img/emblem.png" alt="Añejo"><span>AÑEJO</span></a>
  <div class="nav-r"><span class="role">Trainer Portal</span><button id="signout" style="display:none" onclick="signOut()">Sign out</button></div>
</div></nav>

<div class="wrap" id="app"><p class="muted">Loading…</p></div>
<div class="toast" id="toast"></div>
<div class="modal" id="editModal">
  <div class="box">
    <h3>Edit plan</h3>
    <div class="grid2">
      <label class="fld2">Calories<input id="e_cal" type="number" inputmode="numeric"></label>
      <label class="fld2">Protein g<input id="e_pro" type="number" inputmode="numeric"></label>
      <label class="fld2">Carbs g<input id="e_carb" type="number" inputmode="numeric"></label>
      <label class="fld2">Fat g<input id="e_fat" type="number" inputmode="numeric"></label>
      <label class="fld2">Fiber g<input id="e_fib" type="number" inputmode="numeric"></label>
      <label class="fld2">Bowls / day<input id="e_meals" type="number" inputmode="numeric" min="2" max="4"></label>
    </div>
    <p class="muted" style="font-size:12px;margin-top:10px">Changing calories or bowls/day re-sizes the member's bowls and updates pricing automatically.</p>
    <label class="fld2" style="display:block;margin-top:12px">Trainer note<textarea id="e_notes" rows="3"></textarea></label>
    <div class="modal-actions">
      <button class="btn ghost" type="button" onclick="closeEdit()">Cancel</button>
      <button class="btn" id="e_save" type="button" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<script>
const $ = (id)=>document.getElementById(id);
const money = (c)=>'$'+((c||0)/100).toFixed(2);
const esc = (s)=>String(s==null?'':s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
function toast(t){const e=$('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1800);}

async function signOut(){ try{ await fetch('/api/auth/logout',{method:'POST'});}catch(_){} location.reload(); }
window.signOut = signOut;

async function requestLink(e){
  e.preventDefault();
  const email = $('gemail').value.trim();
  if(!email) return;
  const name = ($('gname')&&$('gname').value.trim())||'';
  const phone = ($('gphone')&&$('gphone').value.trim())||'';
  const btn = e.target.querySelector('button'); btn.disabled=true; btn.textContent='Sending…';
  try{
    const r = await fetch('/api/auth/request-link',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,type:'trainer',name,phone})});
    if(!r.ok){ const d=await r.json().catch(()=>({})); throw new Error(d.error||'Could not send link'); }
    $('app').innerHTML = '<div class="gate"><h2>Check your email</h2><p>We sent a sign-in link to <strong>'+esc(email)+'</strong>. Click it to access your dashboard.</p></div>';
  }catch(err){ btn.disabled=false; btn.textContent='Send sign-in link'; toast(err.message); }
  return false;
}
window.requestLink = requestLink;

function copySub(clientId, tier){
  const url = location.origin + '/subscribe?client=' + encodeURIComponent(clientId) + '&plan=' + encodeURIComponent(tier||'plan_10');
  navigator.clipboard.writeText(url).then(()=>toast('Subscribe link copied'), ()=>toast(url));
}
window.copySub = copySub;

async function sendPlan(planId, btn){
  if(btn){btn.disabled=true;btn.textContent='Sending…';}
  try{
    const r = await fetch('/api/plans/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({plan_id:planId})});
    const d = await r.json(); if(!r.ok||!d.ok) throw new Error(d.error||'Could not send');
    if(d.emailed){ toast('Plan emailed to client'); }
    else { if(d.link) navigator.clipboard.writeText(d.link).catch(()=>{}); toast('Marked sent — link copied to share'); }
    init();
  }catch(e){ if(btn){btn.disabled=false;btn.textContent='Send';} toast(e.message); }
}
window.sendPlan = sendPlan;

let editPlanId = null;
async function openEdit(token, planId){
  editPlanId = planId;
  ['e_cal','e_pro','e_carb','e_fat','e_fib','e_meals','e_notes'].forEach(id=>$(id).value='');
  if(token){ try{ const d = await (await fetch('/api/plan?token='+encodeURIComponent(token))).json();
    if(d.plan){ $('e_cal').value=d.plan.daily_calories||''; $('e_pro').value=d.plan.daily_protein_g||''; $('e_carb').value=d.plan.daily_carbs_g||''; $('e_fat').value=d.plan.daily_fat_g||''; $('e_fib').value=d.plan.daily_fiber_g||''; $('e_meals').value=d.plan.meals_per_day||''; } }catch(_){} }
  $('editModal').style.display='flex';
}
window.openEdit = openEdit;
function closeEdit(){ $('editModal').style.display='none'; editPlanId=null; }
window.closeEdit = closeEdit;
async function saveEdit(){
  if(!editPlanId) return; const btn=$('e_save'); btn.disabled=true; btn.textContent='Saving…';
  try{
    const body={plan_id:editPlanId,daily_calories:$('e_cal').value,daily_protein_g:$('e_pro').value,daily_carbs_g:$('e_carb').value,daily_fat_g:$('e_fat').value,daily_fiber_g:$('e_fib').value,meals_per_day:$('e_meals').value,trainer_notes:$('e_notes').value};
    const r=await fetch('/api/plans/edit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json(); if(!r.ok||!d.ok) throw new Error(d.error||'Could not save');
    closeEdit(); toast('Plan updated'); init();
  }catch(e){ btn.disabled=false; btn.textContent='Save'; toast(e.message); }
}
window.saveEdit = saveEdit;

function gate(){
  $('app').innerHTML =
   '<div class="gate"><h2>Trainer sign-in</h2><p>Enter your email and we\'ll send you a one-time sign-in link.</p>'+
   '<form onsubmit="return requestLink(event)">'+
   '<input id="gemail" type="email" placeholder="you@gym.com" autocomplete="email" required>'+
   '<input id="gname" type="text" placeholder="Your name (optional)" autocomplete="name">'+
   '<input id="gphone" type="tel" placeholder="Mobile (optional)" autocomplete="tel">'+
   '<button class="btn" type="submit">Send sign-in link</button></form>'+
   '<p style="margin-top:16px;font-size:13px">New here? The same link creates your account — name &amp; mobile are saved on first sign-in. <a href="/portal">What is this?</a></p></div>';
}

function render(me, clients, earn){
  const t = me.trainer||{}; const st = me.stats||{};
  $('signout').style.display='inline-block';
  const subscribeNote = clients.length ? 'Use the “Copy subscribe link” on a client to send them their checkout.' : '';
  const rosterRows = clients.length ? clients.map(c=>{
    const tier = c.meal_plan_tier || 'plan_10';
    const plan = c.public_token ? '<a href="/plan.html?token='+encodeURIComponent(c.public_token)+'" target="_blank" rel="noopener">View plan</a>' : '<span class="muted">—</span>';
    const acts = (c.plan_id
      ? '<button class="btn sm ghost" onclick="sendPlan(\''+esc(c.plan_id)+'\',this)">Send</button> '+
        '<button class="btn sm ghost" onclick="openEdit(\''+esc(c.public_token||'')+'\',\''+esc(c.plan_id)+'\')">Edit</button> '
      : '');
    return '<tr><td>'+esc(c.name)+'</td><td><span class="badge '+esc(c.status)+'">'+esc(c.status||'—')+'</span></td><td>'+esc(c.primary_goal||'—')+'</td><td>'+esc(c.meal_plan_tier||'—')+'</td><td>'+plan+'</td>'+
      '<td>'+acts+'<button class="btn sm ghost" onclick="copySub(\''+esc(c.id)+'\',\''+esc(tier)+'\')">Subscribe link</button></td></tr>';
  }).join('') : '';

  const ev = (earn.events||[]);
  const earnRows = ev.length ? ev.map(e=>(
    '<tr><td>'+new Date(e.occurred_at).toLocaleDateString()+'</td><td>'+money(e.amount_cents)+'</td><td><strong>'+money(e.share_cents)+'</strong></td><td><span class="badge '+esc(e.payout_status)+'">'+esc(e.payout_status)+'</span></td></tr>'
  )).join('') : '';

  $('app').innerHTML =
  '<h1>Welcome, <strong>'+esc(t.name||t.email||'Trainer')+'</strong>.</h1>'+
  '<div class="sub">'+esc(t.gym_name||'')+(t.gym_city?' · '+esc(t.gym_city):'')+'</div>'+
  '<div class="cards">'+
    '<div class="card"><div class="k">Clients</div><div class="v">'+(st.clients||0)+'</div></div>'+
    '<div class="card"><div class="k">Active subscriptions</div><div class="v">'+(st.active_subs||0)+'</div></div>'+
    '<div class="card gold"><div class="k">Total earned</div><div class="v">'+money(st.share_cents_total)+'</div></div>'+
  '</div>'+
  (t.affiliate_code ? '<div class="ref"><span class="muted">Your affiliate code</span> <code>'+esc(t.affiliate_code)+'</code> <span class="muted" style="font-size:13px">'+subscribeNote+'</span></div>' : '')+
  '<div class="sec"><div class="sec-h"><h2>Your clients</h2><a class="btn" href="/intake.html">+ Add member</a></div>'+
    (clients.length ? '<table><thead><tr><th>Name</th><th>Status</th><th>Goal</th><th>Plan</th><th></th><th></th></tr></thead><tbody>'+rosterRows+'</tbody></table>'
                    : '<div class="empty">No clients yet. <a href="/intake.html">Add your first member</a> — we\'ll generate their plan.</div>')+
  '</div>'+
  '<div class="sec"><div class="sec-h"><h2>Earnings</h2><span class="muted" style="font-size:13px">Pending '+money(earn.totals&&earn.totals.pending)+' · Paid '+money(earn.totals&&earn.totals.paid)+'</span></div>'+
    (ev.length ? '<table><thead><tr><th>Date</th><th>Gross</th><th>Your share</th><th>Payout</th></tr></thead><tbody>'+earnRows+'</tbody></table>'
               : '<div class="empty">No earnings yet. When a client subscribes, your recurring share shows up here.</div>')+
  '</div>';
}

async function init(){
  let me;
  try{ me = await (await fetch('/api/me')).json(); }
  catch{ $('app').innerHTML='<div class="empty">Could not reach the server.</div>'; return; }
  if(!me.authenticated){ gate(); return; }
  const [clients, earn] = await Promise.all([
    fetch('/api/clients').then(r=>r.ok?r.json():{clients:[]}).catch(()=>({clients:[]})),
    fetch('/api/subscriptions').then(r=>r.ok?r.json():{events:[],totals:{}}).catch(()=>({events:[],totals:{}})),
  ]);
  render(me, clients.clients||[], earn||{});
}
init();
</script>
</body>
</html>
