<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Not found — Añejo Catering Co.</title>
<link rel="icon" type="image/png" href="/assets/img/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&family=Cormorant+Garamond:ital,wght@1,500&display=swap" rel="stylesheet">
<style>
:root{--black:#0D0D0D;--green:#1A3D2E;--gold:#C6A85B;--cream:#F5F2EC;--muted:#9a958a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Josefin Sans',-apple-system,sans-serif;background:var(--black);color:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.box{max-width:480px}
img{height:54px;margin-bottom:24px}
.code{font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-size:72px;color:var(--gold);line-height:1}
h1{font-weight:300;font-size:24px;margin:14px 0 10px;letter-spacing:.5px}
p{color:var(--muted);font-size:15px;margin-bottom:26px;line-height:1.6}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
a.btn{display:inline-block;padding:12px 24px;border-radius:3px;font-size:13px;letter-spacing:2px;text-transform:uppercase;font-weight:600;text-decoration:none}
.gold{background:var(--gold);color:var(--black)}
.outline{border:1px solid var(--cream);color:var(--cream)}
a.gold:hover{background:var(--cream)}a.outline:hover{background:var(--cream);color:var(--black)}
</style>
</head>
<body>
<div class="box">
  <img src="/assets/img/emblem.png" alt="Añejo">
  <div class="code">404</div>
  <h1>This plate isn't on the menu.</h1>
  <p>The page you're looking for moved or never existed. Let's get you back to something delicious.</p>
  <div class="btns">
    <a href="/" class="btn gold">Back home</a>
    <a href="/order" class="btn outline">Order bowls</a>
  </div>
</div>
</body>
</html>
