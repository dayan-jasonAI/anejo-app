<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5">
<meta name="theme-color" content="#0D0D0D">
<meta name="robots" content="noindex">
<title>Add-on confirmed — Añejo Catering Co.</title>
<link rel="icon" type="image/png" href="/assets/img/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600;700&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--black:#0D0D0D;--green:#1A3D2E;--gold:#C6A85B;--cream:#F5F2EC;--muted:#6b6b6b}
  body{margin:0;font-family:'Josefin Sans',-apple-system,sans-serif;background:var(--cream);color:#1A1A1A;line-height:1.6}
  .hero{background:var(--black);color:var(--cream);padding:54px 24px;text-align:center}
  .check{width:64px;height:64px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 18px;border:2px solid var(--gold)}
  h1{font-family:'Cormorant Garamond',Georgia,serif;font-weight:600;font-size:32px;margin:0 0 8px}
  h1 strong{color:var(--gold)}
  .wrap{max-width:520px;margin:0 auto;padding:30px 24px;text-align:center}
  .wrap p{color:var(--muted)}
  .eyebrow{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:12px}
</style>
</head>
<body>
<div class="hero">
  <div class="check">✓</div>
  <div class="eyebrow">Añejo Catering Co.</div>
  <h1>Added to <strong>today's delivery</strong></h1>
</div>
<div class="wrap">
  <p>Your add-on is paid and on its way to the kitchen — it'll ride along with today's drop. We'll text you when your delivery is on the way. ¡Buen provecho!</p>
</div>
</body>
</html>
