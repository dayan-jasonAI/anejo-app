# anejo-cron — tiny standalone Worker that triggers HUB automations on a schedule.
# Cloudflare Pages Functions have no native cron, so this Worker POSTs to
# /api/hub/automations/run with the shared X-Cron-Key header. See cron/README.md.
name = "anejo-cron"
main = "worker.js"
compatibility_date = "2026-05-01"

# Free Workers plan allows up to 5 Cron Triggers — the nightly EOD chase + daily summary
# share one slot (run back-to-back at 01:30 UTC).
[triggers]
crons = [
  "30 1 * * *",    # 01:30 UTC → eod_chase + daily_summary (evening US/Eastern)
  "30 9 * * *",    # 09:30 UTC → route_optimize (early morning ET)
  "0 18 * * *",    # 18:00 UTC → sentiment_scan + ticket_triage (early afternoon ET)
  "0 10 * * 1",    # Mondays 10:00 UTC → restock_suggest
  "0 12 1,15 * *", # 1st + 15th 12:00 UTC → payroll_prep
]
