# anejo-cron — tiny standalone Worker that triggers HUB automations on a schedule.
# Cloudflare Pages Functions have no native cron, so this Worker POSTs to
# /api/hub/automations/run with the shared X-Cron-Key header. See cron/README.md.
name = "anejo-cron"
main = "worker.js"
compatibility_date = "2026-05-01"

# Free Workers plan allows up to 5 Cron Triggers — the nightly EOD chase + daily summary
# share one slot (run back-to-back at 01:30 UTC).
[triggers]
# ONE every-minute trigger; worker.js dispatches each job when the UTC clock matches its
# schedule (see SCHEDULE/EXTRA_ENDPOINTS there). This frees the 5-trigger free-plan cap and
# lets the route-offer timeout sweep (/api/hub/admin/offers-tick) run every minute.
crons = [ "* * * * *" ]
# Phase 5 jobs (reminders-tick daily, D1 backup weekly) ride existing slots via
# EXTRA_ENDPOINTS in worker.js — no new cron triggers, staying within the 5-cron cap.
